<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SW Rush – Comparateur</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #060810;
      --surface: #0d1018;
      --surface2: #121520;
      --surface3: #181d2a;
      --border: #1e2438;
      --border2: #262d42;
      --gold: #c8963c;
      --gold-lt: #e8b860;
      --gold-glow: rgba(200, 150, 60, .15);
      --text: #bcc5e0;
      --text2: #6b748f;
      --text3: #8891a8;
      --left: #3d6fff;
      --right: #ff5522;
      --melee: #d95050;
      --tank: #4080cc;
      --range: #c89030;
      --support: #50a860;
      --pvp: #b83838;
      --pve: #2e8a86;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: 48px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      color: var(--gold);
    }

    .logo-text {
      font-family: 'Cinzel', serif;
      font-size: .9rem;
      color: var(--gold-lt);
      letter-spacing: 2px;
    }

    .logo-sep {
      width: 1px;
      height: 20px;
      background: var(--border2);
      margin: 0 4px;
    }

    .header-hint {
      font-size: .72rem;
      color: var(--text2);
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-box {
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    .search-inner {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 6px 10px;
      transition: border-color .2s;
    }

    .search-inner:focus-within {
      border-color: var(--gold);
    }

    .search-inner svg {
      flex-shrink: 0;
      color: var(--text2);
    }

    .search-inner input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      width: 100%;
    }

    .search-inner input::placeholder {
      color: var(--text2);
    }

    .type-filter {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .tf {
      font-family: 'Inter', sans-serif;
      font-size: .65rem;
      font-weight: 600;
      padding: 5px 4px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .3px;
      text-align: center;
    }

    .tf:hover {
      color: var(--text);
      border-color: var(--border2);
      background: var(--surface2);
    }

    .tf.all {
      grid-column: 1 / -1;
    }

    .tf.active-all {
      border-color: var(--gold);
      color: var(--gold-lt);
      background: var(--gold-glow);
    }

    .tf.active-melee {
      border-color: var(--melee);
      color: var(--melee);
      background: rgba(217, 80, 80, .1);
    }

    .tf.active-tank {
      border-color: var(--tank);
      color: var(--tank);
      background: rgba(64, 128, 204, .1);
    }

    .tf.active-range {
      border-color: var(--range);
      color: var(--range);
      background: rgba(200, 144, 48, .1);
    }

    .tf.active-support {
      border-color: var(--support);
      color: var(--support);
      background: rgba(80, 168, 96, .1);
    }

    .monster-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .monster-list::-webkit-scrollbar {
      width: 3px;
    }

    .monster-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .m-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }

    .m-row:hover {
      background: var(--surface2);
      border-color: var(--border2);
    }

    .m-row.sel-l {
      background: rgba(61, 111, 255, .08);
      border-color: rgba(61, 111, 255, .5);
    }

    .m-row.sel-r {
      background: rgba(255, 85, 34, .08);
      border-color: rgba(255, 85, 34, .5);
    }

    .m-avatar {
      width: 40px;
      height: 40px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border2);
    }

    .m-avatar-ph {
      width: 40px;
      height: 40px;
      border-radius: 7px;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .5rem;
      color: var(--text2);
      flex-shrink: 0;
      border: 1px solid var(--border);
      text-align: center;
      line-height: 1.3;
      padding: 2px;
    }

    .m-row-info {
      min-width: 0;
      flex: 1;
    }

    .m-row-name {
      font-size: .78rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .m-row-sub {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
    }

    .m-row-score {
      font-size: .6rem;
      font-weight: 600;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Role pills */
    .pill {
      font-size: .58rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }

    .pill-melee {
      color: var(--melee);
      border-color: rgba(217, 80, 80, .4);
      background: rgba(217, 80, 80, .1);
    }

    .pill-tank {
      color: var(--tank);
      border-color: rgba(64, 128, 204, .4);
      background: rgba(64, 128, 204, .1);
    }

    .pill-range {
      color: var(--range);
      border-color: rgba(200, 144, 48, .4);
      background: rgba(200, 144, 48, .1);
    }

    .pill-support {
      color: var(--support);
      border-color: rgba(80, 168, 96, .4);
      background: rgba(80, 168, 96, .1);
    }

    /* ── COMPARE ZONE ── */
    .compare {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .compare-cols {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .col {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      border-right: 1px solid var(--border);
      position: relative;
    }

    .col:last-child {
      border-right: none;
    }

    .col::-webkit-scrollbar {
      width: 3px;
    }

    .col::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .col-l {
      background: linear-gradient(160deg, rgba(61, 111, 255, .03) 0%, transparent 40%);
    }

    .col-r {
      background: linear-gradient(160deg, rgba(255, 85, 34, .03) 0%, transparent 40%);
    }

    .col-l::after,
    .col-r::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
    }

    .col-l::after {
      background: linear-gradient(90deg, transparent, var(--left) 40%, transparent);
    }

    .col-r::after {
      background: linear-gradient(90deg, transparent, var(--right) 40%, transparent);
    }

    /* Empty state */
    .empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text2);
      font-size: .8rem;
    }

    .empty-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px dashed var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: .5;
    }

    /* ── MONSTER CARD ── */
    .card-head {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .card-portrait {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
    }

    .card-portrait-ph {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      color: var(--text2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .card-meta {
      min-width: 0;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: var(--gold-lt);
      letter-spacing: 1px;
      margin-bottom: 7px;
    }

    .card-score-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 8px;
    }

    .card-score-label {
      font-size: .65rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .card-score-val {
      font-size: 1.1rem;
      font-weight: 700;
    }

    /* Score bar */
    .score-bar {
      margin-bottom: 16px;
    }

    .score-bar-track {
      height: 5px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .8s cubic-bezier(.4, 0, .2, 1);
    }

    /* Section label */
    .sec-label {
      font-size: .62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Awakening card */
    .awk {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .awk::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 2px 0 0 2px;
    }

    .awk:nth-child(1)::before {
      background: #4466aa;
    }

    .awk:nth-child(2)::before {
      background: var(--gold);
    }

    .awk:nth-child(3)::before {
      background: #cc3355;
    }

    .awk-head {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .awk-lv {
      font-family: 'Cinzel', serif;
      font-size: .63rem;
      font-weight: 700;
      color: var(--gold);
      border: 1px solid rgba(200, 150, 60, .35);
      background: var(--gold-glow);
      border-radius: 5px;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .awk-score {
      font-size: .65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
      border: 1px solid;
      flex-shrink: 0;
    }

    .awk-modes {
      display: flex;
      gap: 3px;
      margin-left: auto;
    }

    .mode-pvp {
      font-size: .6rem;
      padding: 2px 6px;
      border-radius: 5px;
      font-weight: 700;
      color: var(--pvp);
      background: rgba(184, 56, 56, .12);
      border: 1px solid rgba(184, 56, 56, .3);
    }

    .mode-pve {
      font-size: .6rem;
      padding: 2px 6px;
      border-radius: 5px;
      font-weight: 700;
      color: var(--pve);
      background: rgba(46, 138, 134, .12);
      border: 1px solid rgba(46, 138, 134, .3);
    }

    .awk-desc {
      font-size: .74rem;
      line-height: 1.6;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .buff-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 9px;
    }

    .buff-chip {
      font-size: .6rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
      cursor: default;
    }

    .awk-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .awk-bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .awk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .6s ease;
    }

    .awk-bar-val {
      font-size: .6rem;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── BOTTOM BAR ── */
    .bottom {
      height: 44px;
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border2);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    .bottom-label {
      font-size: .65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      flex-shrink: 0;
    }

    .bottom-hint {
      font-size: .75rem;
      color: var(--text2);
      flex: 1;
      text-align: center;
    }

    .bottom-name {
      font-size: .75rem;
      font-weight: 700;
      min-width: 80px;
      flex-shrink: 0;
    }

    .bottom-name.l {
      color: var(--left);
      text-align: right;
    }

    .bottom-name.r {
      color: var(--right);
    }

    .bottom-bars {
      flex: 1;
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .bar-l {
      height: 10px;
      border-radius: 2px 0 0 2px;
      background: var(--left);
      opacity: .8;
      transition: width .6s;
    }

    .bar-r {
      height: 10px;
      border-radius: 0 2px 2px 0;
      background: var(--right);
      opacity: .8;
      transition: width .6s;
    }

    .awk-desc {
      white-space: pre-line;
      /* Ajoute cette ligne */
      font-size: .74rem;
      line-height: 1.6;
      color: var(--text3);
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      body {
        overflow-y: auto;
        /* Permet le scroll global sur mobile */
        height: auto;
      }

      .layout {
        flex-direction: column;
        overflow: visible;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border2);
      }

      .monster-list {
        display: flex;
        flex-direction: row;
        /* Liste horizontale défilante pour les icônes */
        overflow-x: auto;
        padding: 10px;
        gap: 10px;
      }

      .m-row {
        flex-direction: column;
        min-width: 80px;
        text-align: center;
      }

      .m-row-info,
      .m-row-score {
        display: none;
      }

      /* On cache les détails dans la liste mobile */

      .compare-cols {
        flex-direction: column;
      }

      .col {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow: visible;
      }

      .bottom {
        position: sticky;
        bottom: 0;
        z-index: 100;
      }
    }
  </style>
</head>

<body>

  <script>

    const AWK3 = { level: 3, desc: "Réduit de 100% le temps de recharge de ses compétences au début du combat.", buffs: ["cd_reset"], pvp: true, pve: true };

    const MONSTERS = {

      "Mago": {

          {

  <header>
    <div class="logo">
      <svg class="logo-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path d="M12 2L8 8H2l5 4-2 7 7-4 7 4-2-7 5-4h-6z" />
      </svg>
      <span class="logo-text">SW RUSH · COMPARATEUR</span>
    </div>
    <div class="logo-sep"></div>
    <span class="header-hint">Cliquez un monstre pour le sélectionner, lorsque deux monstres sont sélectionnés, cliquez
      sur un autre monstre pour remplacer le premier, ainsi de suite.</span>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="search-box">
        <div class="search-inner">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="searchInput" type="text" placeholder="Rechercher…" oninput="applyFilters()">
        </div>
      </div>
      <div class="type-filter" id="typeFilter">
        <button class="tf all active-all" data-type="">Tous</button>
        <button class="tf" data-type="melee">Mêlée</button>
        <button class="tf" data-type="tank">Tank</button>
        <button class="tf" data-type="range">Range</button>
        <button class="tf" data-type="support">Support</button>
      </div>
      <div class="monster-list" id="monsterList"></div>
    </div>

    <!-- COMPARE -->
    <div class="compare">
      <div class="compare-cols">
        <div class="col col-l" id="colLeft">
          <div class="empty">
            <div class="empty-ring">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="16" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
            </div>
            1er monstre
          </div>
        </div>
        <div class="col col-r" id="colRight">
          <div class="empty">
            <div class="empty-ring">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="16" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
            </div>
            2ème monstre
          </div>
        </div>
      </div>
      <div class="bottom" id="bottom">
        <span class="bottom-hint">Sélectionnez deux monstres pour comparer</span>
      </div>
    </div>

  </div>

  <script>
    let sel = { left: null, right: null }, nextSlot = 'left', activeType = '';

    const ROLE = {
      melee: { label: 'Mêlée', cls: 'pill-melee' },
      tank: { label: 'Tank', cls: 'pill-tank' },
      range: { label: 'Range', cls: 'pill-range' },
      support: { label: 'Support', cls: 'pill-support' },
    };

    function rgb(h) { return `${parseInt(h.slice(1, 3), 16)},${parseInt(h.slice(3, 5), 16)},${parseInt(h.slice(5, 7), 16)}` }
    function awkPts(a) { return (a.buffs || []).reduce((s, id) => s + (BUFFS[id] ? BUFFS[id].power : 0), 0) }
    function totalPts(m) { return (m.awakenings || []).reduce((s, a) => s + awkPts(a), 0) }
    function maxPts(m) { return Math.max((m.awakenings || []).length * 30, 1) }

    function col(r) { return r >= .7 ? '#50a860' : r >= .4 ? '#c8963c' : '#c04040' }
    function grad(r) { return r >= .7 ? 'linear-gradient(90deg,#287030,#50a860)' : r >= .4 ? 'linear-gradient(90deg,#7a5010,#c8963c)' : 'linear-gradient(90deg,#702020,#c04040)' }

    function chips(ids) {
      return (ids || []).map(id => {
        const b = BUFFS[id]; if (!b) return '';
        return `<span class="buff-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.12)" title="${b.desc} · Puissance : ${b.power}">${b.label}</span>`;
      }).join('');
    }

    function renderCard(name) {
      const m = MONSTERS[name], tot = totalPts(m), max = maxPts(m), r = tot / max;
      const c = col(r), g = grad(r), role = ROLE[m.type] || { label: m.type, cls: '' };
      const src = `${IMAGES_PATH}${name}.png`;
      let awHTML = '';
      (m.awakenings || []).forEach(a => {
        const pts = awkPts(a), ar = pts / 30, ac = col(ar), ag = grad(ar), ch = chips(a.buffs || []);
        awHTML += `
      <div class="awk">
        <div class="awk-head">
          <span class="awk-lv">Éveil ${a.level}</span>
          <span class="awk-score" style="color:${ac};border-color:${ac};background:rgba(${rgb(ac)},.1)">⚡ ${pts} pts</span>
          <div class="awk-modes">
            ${a.pvp ? '<span class="mode-pvp">PvP</span>' : ''}
            ${a.pve ? '<span class="mode-pve">PvE</span>' : ''}
          </div>
        </div>
        <div class="awk-desc">${a.desc}</div>
        ${ch ? `<div class="buff-list">${ch}</div>` : ''}
        <div class="awk-bar">
          <div class="awk-bar-track"><div class="awk-bar-fill" style="width:${Math.min(ar * 100, 100)}%;background:${ag}"></div></div>
          <span class="awk-bar-val" style="color:${ac}">${pts}/30</span>
        </div>
      </div>`;
      });
      return `
    <div class="card-head">
      <img class="card-portrait" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=card-portrait-ph>${name}</div>'">
      <div class="card-meta">
        <div class="card-name">${name}</div>
        <span class="pill ${role.cls}">${role.label}</span>
        <div class="card-score-row">
          <span class="card-score-label">Score total</span>
          <span class="card-score-val" style="color:${c}">${tot}</span>
          <span style="font-size:.65rem;color:var(--text2)">/ ${max}</span>
        </div>
      </div>
    </div>
    <div class="score-bar">
      <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.min(r * 100, 100)}%;background:${g}"></div></div>
    </div>
    <div class="sec-label">Éveils · ${(m.awakenings || []).length}</div>
    ${awHTML}`;
    }

    function updateBottom() {
      const bot = document.getElementById('bottom');
      if (!sel.left || !sel.right) { bot.innerHTML = '<span class="bottom-hint">Sélectionnez deux monstres pour comparer</span>'; return; }
      const lp = totalPts(MONSTERS[sel.left]), rp = totalPts(MONSTERS[sel.right]);
      const mx = Math.max(lp, rp) || 1, lw = Math.round(lp / mx * 46), rw = Math.round(rp / mx * 46);
      bot.innerHTML = `
    <span class="bottom-label">Score</span>
    <span class="bottom-name l">${sel.left}<br><span style="font-size:.62rem;opacity:.6;font-weight:400">${lp} pts</span></span>
    <div class="bottom-bars">
      <div class="bar-l" style="width:${lw}%"></div>
      <div class="bar-r" style="width:${rw}%"></div>
    </div>
    <span class="bottom-name r">${sel.right}<br><span style="font-size:.62rem;opacity:.6;font-weight:400">${rp} pts</span></span>`;
    }

    function emptyHTML(side) { return `<div class="empty"><div class="empty-ring"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>${side === 'left' ? '1er' : '2ème'} monstre</div>`; }

    function pick(name) {
      const slot = nextSlot, cid = 'col' + slot[0].toUpperCase() + slot.slice(1);
      if (sel[slot] === name) {
        sel[slot] = null;
        document.getElementById(cid).innerHTML = emptyHTML(slot);
      } else {
        sel[slot] = name;
        document.getElementById(cid).innerHTML = renderCard(name);
        nextSlot = slot === 'left' ? 'right' : 'left';
      }
      refresh(); updateBottom();
    }

    function refresh() {
      document.querySelectorAll('.m-row').forEach(el => {
        el.classList.toggle('sel-l', sel.left === el.dataset.name);
        el.classList.toggle('sel-r', sel.right === el.dataset.name);
      });
    }

    function buildList() {
      const list = document.getElementById('monsterList'), q = document.getElementById('searchInput').value.toLowerCase();
      list.innerHTML = '';
      const names = Object.keys(MONSTERS).filter(n => (!activeType || MONSTERS[n].type === activeType) && n.toLowerCase().includes(q));
      if (!names.length) { list.innerHTML = `<div style="color:var(--text2);font-size:.75rem;padding:16px;text-align:center">Aucun résultat</div>`; return; }
      names.forEach(name => {
        const m = MONSTERS[name], el = document.createElement('div');
        el.className = 'm-row'; el.dataset.name = name;
        if (sel.left === name) el.classList.add('sel-l');
        if (sel.right === name) el.classList.add('sel-r');
        const role = ROLE[m.type] || { label: m.type, cls: '' };
        const sc = totalPts(m), c = col(sc / maxPts(m));
        el.innerHTML = `
      <img class="m-avatar" src="${IMAGES_PATH}${name}.png" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="m-avatar-ph" style="display:none">${name}</div>
      <div class="m-row-info">
        <div class="m-row-name">${name}</div>
        <div class="m-row-sub">
          <span class="pill ${role.cls}">${role.label}</span>
        </div>
      </div>`;
        el.onclick = () => pick(name);
        list.appendChild(el);
      });
    }

    function applyFilters() { buildList(); }

    // Type filter buttons
    document.getElementById('typeFilter').addEventListener('click', e => {
      const btn = e.target.closest('.tf'); if (!btn) return;
      document.querySelectorAll('.tf').forEach(b => { b.className = 'tf' + (b.classList.contains('all') ? ' all' : ''); });
      const type = btn.dataset.type;
      activeType = type;
      btn.classList.add(type ? `active-${type}` : 'active-all');
      buildList();
    });

    buildList();
  </script>

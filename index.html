<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SW Rush Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/data-monster.js" defer></script>
    <script src="js/tdo.js" defer></script>
    <script src="js/gdg.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <div id="nav">
        <div class="logo">★ SW Rush Tool</div>
        <button class="ntab on" id="tab-cmp" onclick="switchTab('cmp')">Fiche des monstres</button>
        <button class="ntab" id="tab-tb" onclick="switchTab('tb')">Team Builder</button>
        <button class="ntab" id="tab-tl" onclick="switchTab('tl')">Tier List</button>
        <button class="ntab" id="tab-me" onclick="switchTab('me')">Mes Éveils</button>
        <div class="nav-right">
            <div class="nav-search">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
                <input id="srch" type="text" placeholder="Rechercher…" oninput="onSearch()">
            </div>
        </div>
    </div>
    <div id="root">
        <div id="sb">
            <div class="sb-filters">
                <div class="frow" id="typeRow">
                    <button class="fp fa" data-t="">Tous</button>
                    <button class="fp" data-t="melee">Mêlée</button>
                    <button class="fp" data-t="tank">Tank</button>
                    <button class="fp" data-t="range">Range</button>
                    <button class="fp" data-t="support">Support</button>
                </div>
                <div class="frow" id="catRow">
                    <button class="fp" data-c="atk">ATQ</button>
                    <button class="fp" data-c="crit">Crit</button>
                    <button class="fp" data-c="spd">Vitesse</button>
                    <button class="fp" data-c="range">Portée</button>
                    <button class="fp" data-c="def">Déf</button>
                    <button class="fp" data-c="cc">CC</button>
                    <button class="fp" data-c="dot">DoT</button>
                    <button class="fp" data-c="team">Team</button>
                </div>
            </div>
            <div id="grid"></div>
        </div>
        <div id="main">
            <div class="panel on" id="panelCmp">
                <div id="cmpPanel">
                    <div id="cmpShared"><span class="sh-lbl">Buffs communs :</span><div id="sharedChips"></div></div>
                    <div id="cmpList"><div class="cmp-empty">Cliquez sur un monstre pour commencer.</div></div>
                </div>
            </div>
            <div class="panel off" id="panelTb">
                <div id="tbPanel">
                    <div class="tb-topbar" id="tbTopbar">
                        <span class="tb-title">Team Builder</span>
                        <div id="szRow" style="display:flex;gap:4px">
                            <button class="sz" data-s="10" onclick="setSize(10)">10</button>
                            <button class="sz on" data-s="15" onclick="setSize(15)">15</button>
                            <button class="sz" data-s="25" onclick="setSize(25)">25</button>
                        </div>
                        <button class="tb-clr" id="tbClrBtn" onclick="clearTeam()" disabled>Vider</button>
                        <button class="tb-info-btn" onclick="openTbInfo()" title="Comment fonctionne la sélection automatique ?">ℹ️ Info</button>
                        <span class="tb-ctr" id="tbCtr">0 / 15</span>
                    </div>
                    <div class="tb-saves-bar" id="tbSavesBar"></div>
                    <div id="tbReco"><span class="reco-lbl">Suggestions :</span><div id="recoChips"></div></div>
                    <div id="tbContent">
                        <div id="tbSlots"></div>
                        <div id="tbScores"></div>
                        <div id="tbBuffBtnWrap"></div>
                    </div>
                </div>
                <div class="tbinfo-overlay" id="tbInfoModal" style="display:none" onclick="if(event.target===this)closeTbInfo()">
                    <div class="tbinfo-box">
                        <button class="tbinfo-close" onclick="closeTbInfo()">✕</button>
                        <div id="tbInfoContent"></div>
                    </div>
                </div>
            </div>
            <div class="panel off" id="panelTl">
                <div id="tlPanel">
                    <div class="tl-topbar">
                        <span class="tl-title">Tier List</span>
                        <button class="tl-reset" onclick="resetTier()">Réinitialiser</button>
                        <div id="tlCatRow" style="display:flex;gap:4px;flex-wrap:wrap">
                            <button class="fp fa" data-tc="" onclick="setTlCat('')">Tous</button>
                            <button class="fp" data-tc="atk" onclick="setTlCat('atk')">ATQ</button>
                            <button class="fp" data-tc="crit" onclick="setTlCat('crit')">Crit</button>
                            <button class="fp" data-tc="spd" onclick="setTlCat('spd')">Vitesse</button>
                            <button class="fp" data-tc="range" onclick="setTlCat('range')">Portée</button>
                            <button class="fp" data-tc="def" onclick="setTlCat('def')">Déf</button>
                            <button class="fp" data-tc="cc" onclick="setTlCat('cc')">CC</button>
                            <button class="fp" data-tc="dot" onclick="setTlCat('dot')">DoT</button>
                            <button class="fp" data-tc="team" onclick="setTlCat('team')">Team</button>
                        </div>
                        <span class="tl-hint">Glissez les portraits dans les rangs</span>
                    </div>
                    <div id="tlContent"></div>
                    <div id="tlPool">
                        <div class="tl-pool-title">Non classés</div>
                        <div id="tlPoolGrid"></div>
                    </div>
                </div>
            </div>
            <div class="panel off" id="panelMe">
                <div id="mePanel">
                    <div class="me-topbar">
                        <span class="me-title">Mes Éveils</span>
                        <span id="meScoreInline" class="me-score-inline"></span>
                        <button class="me-recap-toggle" id="meRecapToggle" onclick="toggleMeRecap()">▼ Détails</button>
                        <div class="me-actions">
                            <button class="me-btn" onclick="importAwk()">⬆ Importer</button>
                            <button class="me-btn" onclick="exportAwk()">⬇ Exporter</button>
                            <button class="me-btn danger" onclick="resetAwk()">Réinitialiser</button>
                        </div>
                    </div>
                    <div class="me-recap collapsed" id="meRecap">
                        <div class="me-recap-body">
                            <div class="me-recap-counts">
                                <div class="me-stat"><span style="color:#888">Éveil 3 :</span><span class="me-stat-num" style="color:#ccc" id="meStat3">0</span></div>
                                <div class="me-stat"><span style="color:var(--gold)">Éveil 5★ :</span><span class="me-stat-num" style="color:var(--gold)" id="meStat5">0</span></div>
                                <div class="me-stat"><span style="color:#cc2848">Éveil 7★ :</span><span class="me-stat-num" style="color:#cc2848" id="meStat7">0</span></div>
                            </div>
                            <div>
                                <div class="me-buff-section-title">Buffs conditionnels actifs</div>
                                <div class="me-buff-chips" id="meRecapBuffs"></div>
                            </div>
                        </div>
                    </div>
                    <div class="me-filters" id="meTypeRow">
                        <button class="fp fa" data-mt="">Tous</button>
                        <button class="fp" data-mt="melee">Mêlée</button>
                        <button class="fp" data-mt="tank">Tank</button>
                        <button class="fp" data-mt="range">Range</button>
                        <button class="fp" data-mt="support">Support</button>
                    </div>
                    <div class="me-body">
                        <div class="me-grid-wrap">
                            <div class="me-grid" id="meGridInner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e24;--s1:#26262e;--s2:#2e2e38;--s3:#36363f;--b1:#3a3a46;--b2:#4a4a58;
  --green:#8ab820;--green2:#a8d428;
  --tx:#d8d8e8;--tx2:#707088;--tx3:#a0a0b8;
  --mel:#e05050;--tnk:#4888d8;--rng:#c89020;--sup:#38b060;
  --hi:#40c870;--mid:#c89020;--lo:#c83030;
  --gold:#d4a830;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;font-size:16px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* ── NAV ── */
#nav{height:46px;background:var(--s1);border-bottom:2px solid #18181e;display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0}
.logo{font-size:1rem;font-weight:800;color:var(--green2);letter-spacing:1px;margin-right:20px}
.ntab{padding:0 18px;height:46px;border:none;background:none;color:var(--tx2);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.2px}
.ntab:hover{color:var(--tx3)}
.ntab.on{color:var(--green2);border-bottom-color:var(--green2)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-search{position:relative}
.nav-search input{background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:6px 10px 6px 30px;color:var(--tx);font-size:.82rem;outline:none;width:200px;font-family:inherit}
.nav-search input:focus{border-color:var(--green)}
.nav-search input::placeholder{color:var(--tx2)}
.nav-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.4;flex-shrink:0}

/* ── ROOT ── */
#root{display:flex;height:calc(100% - 46px);overflow:hidden}
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.panel.off{display:none}

/* ── SIDEBAR ── */
#sb{width:300px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.sb-filters{padding:8px 10px;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:6px}
.frow{display:flex;gap:4px;flex-wrap:wrap}
.fp{font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:3px;border:1px solid var(--b1);background:none;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .1s}
.fp:hover{background:var(--s2);color:var(--tx3)}
.fp.fa{border-color:rgba(168,212,40,.4);color:var(--green2);background:rgba(168,212,40,.08)}
.fp.fm{border-color:rgba(224,80,80,.35);color:var(--mel);background:rgba(224,80,80,.07)}
.fp.ft{border-color:rgba(72,136,216,.35);color:var(--tnk);background:rgba(72,136,216,.07)}
.fp.fr{border-color:rgba(200,144,32,.35);color:var(--rng);background:rgba(200,144,32,.07)}
.fp.fs{border-color:rgba(56,176,96,.35);color:var(--sup);background:rgba(56,176,96,.07)}
.fp.fbc{border-color:var(--b2);color:var(--tx3);background:var(--s3)}

/* ── GRID ── */
#grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-content:start}
.pc {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    background: var(--s2);
    border: 2px solid var(--b1);
    transition: all .14s;
    
    min-height: 110px; /* Ajoute la hauteur minimale de ton choix */
}
.pc:hover{border-color:var(--b2);transform:translateY(-1px)}
.pc.sel{border-color:var(--green)}
.pc img {
    width: 100%;
    height: 100%;      /* Remplace aspect-ratio par height: 100% */
    object-fit: cover;
    object-position: top center;
    display: block;
}
.pc-bot{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.88));padding:18px 5px 5px}
.pc-name{font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.pc-score{font-size:.64rem;font-weight:800;text-align:center}
.pc-type{position:absolute;top:4px;left:4px;font-size:.55rem;font-weight:900;background:rgba(0,0,0,.7);padding:1px 4px;border-radius:3px}
.pc-badge{position:absolute;top:4px;right:4px;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:900;border:1.5px solid rgba(0,0,0,.5)}

/* ── MAIN PANELS ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ══ COMPARATEUR ══ */
#cmpPanel{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ligne monstre comparateur */
.mrow{display:grid;grid-template-columns:90px 1fr 1px 1fr 1px 1fr;min-height:90px;background:var(--s2);border-radius:6px;overflow:hidden;border:1px solid var(--b1);transition:border-color .15s}

.mrow:hover .mrow-port-rm{display:flex}
.mrow-info{padding:10px 14px;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0}
.mrow-name{font-size:.96rem;font-weight:700;color:var(--tx)}
.mrow-type{display:inline-flex;align-items:center;gap:4px;font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:3px;border:1px solid}
.mrow-tagline{font-size:.76rem;color:var(--tx3);margin-top:2px}
.mrow-score{font-size:1.6rem;font-weight:900;letter-spacing:.5px}
.mrow-bar{height:3px;background:var(--b1);border-radius:2px;margin-top:4px;overflow:hidden}
.mrow-barf{height:100%;border-radius:2px}
.mrow-div{width:1px;background:var(--b1);flex-shrink:0}
.mrow-awk{padding:8px 12px;display:flex;flex-direction:column;justify-content:flex-start;gap:3px;min-width:0;overflow:hidden}
.awk-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}

.awk-title.lv7{color:#cc2848}

.bchip {
    display: inline-flex;

    gap: 4px;
    font-size: .7rem;
    padding: 2px 7px;

    overflow: visible;         /* Rend le texte visible */

}
.bchip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bchip-tag{font-size:.52rem;font-weight:800;text-transform:uppercase;padding:1px 3px;border-radius:2px;flex-shrink:0}
.bt-team{background:rgba(200,152,32,.15);color:#c8a020;border:1px solid rgba(200,152,32,.25)}

/* shared bar */

.syn-lbl{flex:1;font-size:.76rem;color:var(--tx3);min-width:0;white-space:normal;overflow:visible;text-overflow:unset;word-break:break-word}

/* ══ TIER LIST ══ */
#tlPanel{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* tier row */

/* unranked pool */

.tl-pool-pc:active{cursor:grabbing;opacity:.7}
.tl-pool-pc img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
.tl-pool-pc-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.8);font-size:.5rem;font-weight:700;color:#fff;text-align:center;padding:2px}

/* type badges */
.tc-m{color:var(--mel);border-color:rgba(224,80,80,.35);background:rgba(224,80,80,.07)}
.tc-t{color:var(--tnk);border-color:rgba(72,136,216,.35);background:rgba(72,136,216,.07)}

<body>
<div id="nav">
  <div class="logo">★ SW Rush</div>

<script>
const CW=.6;
const TCOL={melee:'var(--mel)',tank:'var(--tnk)',range:'var(--rng)',support:'var(--sup)'};
const TLBL={melee:'Mêlée',tank:'Tank',range:'Range',support:'Support'};
const TCLS={melee:'tc-m',tank:'tc-t',range:'tc-r',support:'tc-s'};
const SCOLS=['#4888d8','#c89020','#d84040'];
const TIERS=[{id:'S',label:'S',bg:'#b83030'},{id:'A',label:'A',bg:'#c07020'},{id:'B',label:'B',bg:'#a09020'},{id:'C',label:'C',bg:'#408830'},{id:'D',label:'D',bg:'#505080'}];
function rgb(h){h=h.replace('#','');return`${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`}
function bVal(id){const b=BUFFS[id];return b?Math.round(b.power*(b.cond?CW:1)):0}
function awkRaw(a){return(a.buffs||[]).reduce((s,id)=>s+bVal(id),0)}
const ALL_SC=Object.values(MONSTERS).flatMap(m=>(m.awakenings||[]).filter(a=>a.level!==3).map(awkRaw));
const MAX_AW=Math.max(...ALL_SC);
function awkPts(a){return Math.round(awkRaw(a)/MAX_AW*100)}
function totPts(m){return(m.awakenings||[]).filter(a=>a.level!==3).reduce((s,a)=>s+awkPts(a),0)}
const MAX_T=200;
function sCol(r){return r>=.68?'var(--hi)':r>=.38?'var(--mid)':'var(--lo)'}
function genTagline(nm){
  const m = MONSTERS[nm];
  if (!m) return 'Combattant polyvalent';

  // Récupération de tous les buffs hors éveil niveau 3
  const buffs = (m.awakenings || []).filter(a => a.level !== 3).flatMap(a => a.buffs || []);
  const has = id => buffs.includes(id);
  const any = ids => ids.some(id => has(id));

  // 1. Furtivité & Burst Massif
  if (has('dmg_150')) return 'Explose sous Furtivité';

  // 2. Attaque brute colossale
  if (any(['atk_80', 'atk_100'])) return 'Attaquant redoutable avec une attaque de base élevée';

  // 3. Protection d'équipe & Utilitaires Majeurs
  if (has('cc_immune_team_30')) return 'Protège toute l\'équipe contre les CC';
  if (has('fran_blessing_team')) return 'Immunité + dégâts groupés pour les alliés';
  if (has('spd_team_20')) return 'Accélère l\'équipe en combat';

  // 4. Multiplicateurs de dégâts (Buffs / Debuffs)
  if (any([, 'dmg_debuff_scaling'])) return 'Plus l\'ennemi est affaibli, plus il est détruit';
  if (any(['dmg_buff_scaling'])) return 'Plus il est buffé, plus il inflige des dégâts massifs';
  if (any(['perfect_team', 'one_team_one_spirit', 'teamwork_stack'])) return 'Brille avec des boost d\'équipe bien orchestrés';

  // 5. Zone & Longue portée
  if (any(['range_3', 'range_5']) && any(['dmg_aoe_scaling', 'aoe_range_30', 'aoe_range_30_cond'])) return 'Longue portée — ravage les groupes';

  // 6. Mécanique de multi-coups accumulés (Bloom / Floraison)
  if (any(['full_bloom', 'bloom_stack', 'double_triple_dmg_team'])) return 'Taux et dégâts des coups Double et/ou Triple Hit augmentée';

  // 7. Punition des ennemis sous Altération de contrôle (CC)
  if (any(['dmg_frozen_50', 'dmg_stunned_50', 'dmg_cc_50', 'dmg_def_down_50', 'dmg_petrified_20', 'dmg_sleeping_20', 'target_weakness_provoke'])) return 'Punit sévèrement les ennemis sous contrôle';

  // 8. Exploitation des DoT (Poison, Saignement, Brûlure)
  if (any(['dmg_dot_50', 'dmg_poisoned_20', 'dmg_bleed_20', 'dmg_burned_20', 'dot_poison', 'weakness_poison_enemy'])) return 'Exploite les DoT pour amplifier ses dégâts';

  // 9. Enchaînements de coups physiques assurés
  if (any(['double_hit_15', 'triple_hit_10', 'double_hit_10_cond', 'double_hit_10'])) return 'Taux des coups Double et/ou Triple Hit augmentée';

  // 10. Archétype de classe unique
  if (has('class_share_melee')) return 'Tank qui se prend pour un mêlée';

  // 11. Amplification offensive d'équipe
  if (any(['crush_rate_10_team' , 'crush_rate_10', 'crush_rate_20', 'crush_rate_20_cond', 'crush_dmg_20_ally', 'crush_rate_20_ally', 'crush_dmg_20'])) return 'Amplifie l\'équipe — coups puissants renforcés';
  if (any(['shield_hits_3_team', 'dmg_resist_20_team'])) return 'Bouclier vivant — protège ses alliés';

  // 12. Interaction et destruction des Boucliers ennemis
  if (any(['strip_shield', 'block_shield', 'target_weakness_shield'])) return 'Perce-bouclier';

  // 13. Réduction des Temps de Recharge (Gestion de la jauge / cooldowns)
  if (any(['cd_skill_cond', 'cd_reset_proc', 'no_crit_cd', 'exclusive_cd_down', 'skill_accel_20_cond', 'skill_accel_15'])) return 'Enchaîne ses compétences rapidement';

  // 14. Survivabilité pure (Endurance, Esquive, Réduction de dégâts reçus)
  if (any(['dodge_3s', 'endurance_cond', 'dmg_resist_80_cond', 'dmg_resist_15_cond', 'dmg_resist_10', 'dmg_resist_20_cond', 'limit_shield', 'protection_shield', 'cc_immune_self_react'])) return 'Survivant hors pair';

  // 15. Spécialisation Critique & Coups Puissants (Self-buffs)
  if (any(['crit_rate_50', 'crit_rate_10', 'crit_rate_10_cond', 'crit_dmg_20', 'crit_dmg_10_cond', 'crit_res_10_cond'])) return 'Spécialiste des coups critiques';

  // 16. Exploitation des Faiblesses et Détection
  if (any(['weak_point_detect', 'weakness_elem_team','weakness_element', 'debuff_aoe_taken_10', 'debuff_crit_taken_10', 'target_weakness_immunity', 'bleed'])) return 'Détecte et exploite impitoyablement les failles ennemies';

  // 17. Mécaniques spécifiques complexes (Boxes, Rockstar, Feu de renard...)
  if (any(['happy_box_cond', 'merry_box_team_cond', 'rockstar_i', 'rockstar_iii_cond', 'fox_fire_cond', 'fox_fire_burst', 'dmg_unique_target', 'cc_eff_20', 'atk_down_ennemy_count', 'crush_dmg_20_ally', 'crush_rate_20_ally'])) return 'Utilise des mécaniques uniques pour surprendre l\'ennemi';

  // 18. Auto-buffs de statistiques standards (ATQ, VIT, Sangsue)
  if (any(['atk_10', 'atk_20', 'atk_25_delay', 'atk_up_stack', 'spd_15', 'spd_30', 'spd_10', 'spd_40_cond', 'spd_15_cond', 'hp_max_15_cond', 'lifesteal_15_cond', 'res_lp_30'])) return 'Combattant redoutable optimisant ses statistiques';

  // 19. Bonus de dégâts générique de palier d'Éveil
  if (has('dmg_20')) return 'Combattant polyvalent amélioré';

  return 'Combattant polyvalent';
}

let selCmp=[null,null,null],selTb=[],activeTab='cmp',activeType='',activeCat='',teamSize=15;
let tlData={S:[],A:[],B:[],C:[],D:[]},tlDragName=null,tlDragFrom=null,cmpDragName=null;
let tlCat='';

/* ── TAB ── */
function switchTab(t){
  activeTab=t;
  ['cmp','tb','tl'].forEach(id=>{
    document.getElementById('tab-'+id).classList.toggle('on',id===t);
    document.getElementById('panel'+id.charAt(0).toUpperCase()+id.slice(1)).className='panel '+(id===t?'on':'off');
  });
  buildGrid();
  if(t==='tl')renderTierList();
}

/* ── FILTERS ── */
document.getElementById('typeRow').addEventListener('click',e=>{
  const b=e.target.closest('.fp');if(!b||!('t' in b.dataset))return;
  document.querySelectorAll('#typeRow .fp').forEach(x=>x.className='fp');
  activeType=b.dataset.t;
  b.classList.add(activeType===''?'fa':activeType==='melee'?'fm':activeType==='tank'?'ft':activeType==='range'?'fr':'fs');
  buildGrid();
});
document.getElementById('catRow').addEventListener('click',e=>{
  const b=e.target.closest('.fp');if(!b||!('c' in b.dataset))return;
  const c=b.dataset.c;
  if(activeCat===c){activeCat='';document.querySelectorAll('#catRow .fp').forEach(x=>x.className='fp');}
  else{document.querySelectorAll('#catRow .fp').forEach(x=>x.className='fp');activeCat=c;b.classList.add('fbc');}
  buildGrid();
});
function hasBuffCat(nm){
  if(!activeCat)return true;
  const ids=new Set((BUFF_CATS[activeCat]||{ids:[]}).ids);
  return(MONSTERS[nm].awakenings||[]).some(a=>a.level!==3&&(a.buffs||[]).some(id=>ids.has(id)));
}

/* ── GRID ── */
function buildGrid(){
  const q=document.getElementById('srch').value.toLowerCase();
  const g=document.getElementById('grid');
  const placed={};
  TIERS.forEach(t=>tlData[t.id].forEach(nm=>{placed[nm]=t.id;}));

  const names=Object.keys(MONSTERS).filter(n=>{
    if(activeType&&MONSTERS[n].type!==activeType)return false;
    if(!n.toLowerCase().includes(q))return false;
    if(activeTab==='tl'&&tlCat&&!hasBuffCat(n))return false;
    if(activeTab!=='tl'&&activeCat&&!hasBuffCat(n))return false;
    return true;
  }).sort((a,b)=>totPts(MONSTERS[b])-totPts(MONSTERS[a]));

  g.innerHTML='';
  names.forEach(nm=>{
    const m=MONSTERS[nm],tot=totPts(m),r=tot/MAX_T,sc=sCol(r);
    const iC=selCmp.indexOf(nm),iT=selTb.includes(nm);
    const tier=placed[nm];
    const d=document.createElement('div');
    d.className='pc'+(iC!==-1?' sel':'');
    d.draggable=true;

    let badge='';
    if(activeTab==='tl'&&tier){
      const bg=TIERS.find(t=>t.id===tier)?.bg||'#666';
      badge=`<div class="pc-badge" style="background:${bg};color:#fff;font-size:.58rem">${tier}</div>`;
    }else if(iC!==-1){
      badge=`<div class="pc-badge" style="background:rgba(${rgb(SCOLS[iC])},.3);color:${SCOLS[iC]}">${iC+1}</div>`;
    }else if(iT){
      badge=`<div class="pc-badge" style="background:rgba(168,212,40,.2);color:var(--green2)">✓</div>`;
    }

    d.innerHTML=`<img src="${IP}${nm}.png" loading="lazy" onerror="this.src=''">
      <div class="pc-type" style="color:${TCOL[m.type]}">${{melee:'⚔',tank:'🛡',range:'🏹',support:'💚'}[m.type]}</div>
      ${badge}
      <div class="pc-bot"><div class="pc-name">${nm}</div><div class="pc-score" style="color:${sc}">${tot}</div></div>`;

    d.addEventListener('dragstart',e=>{
      cmpDragName=nm;tlDragName=nm;tlDragFrom='pool';
      e.dataTransfer.effectAllowed='copy';
    });
    d.addEventListener('dragend',()=>{cmpDragName=null;});
    d.addEventListener('click',()=>{
      if(activeTab==='cmp'){
        const i=selCmp.indexOf(nm);
        if(i!==-1)selCmp[i]=null;
        else{const fi=selCmp.indexOf(null);if(fi!==-1)selCmp[fi]=nm;}
        renderCmp();
      }else if(activeTab==='tb'){
        const i=selTb.indexOf(nm);
        if(i!==-1)selTb.splice(i,1);
        else if(selTb.length<teamSize)selTb.push(nm);
        renderTeam();
      }else if(activeTab==='tl'){
        if(!tier){tlData['B'].push(nm);renderTierList();}
      }
      buildGrid();
    });
    g.appendChild(d);
  });
}

/* ══ COMPARATEUR ══ */
function buffChips(buffs){
  return buffs.map(id=>{
    const b=BUFFS[id];if(!b)return'';
    return`<div class="bchip" style="border-left:3px solid ${b.color}">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;font-size:.7rem;color:var(--tx3)">${b.label}</span>
      ${b.team?'<span class="bchip-tag bt-team">Team</span>':''}
      ${b.cond?'<span class="bchip-tag bt-cond">Condition</span>':''}
    </div>`;
  }).join('');
}

function renderCmpRow(nm,idx){
  const m=MONSTERS[nm],tot=totPts(m),r=tot/MAX_T,c=sCol(r),col=SCOLS[idx];
  const awks=(m.awakenings||[]).filter(a=>a.level!==3);
  const a5=awks.find(a=>a.level===5),a7=awks.find(a=>a.level===7);
  const pts5=a5?awkPts(a5):0,pts7=a7?awkPts(a7):0;
  return`<div class="mrow" style="border-left:3px solid ${col}">
    <div class="mrow-port">
      <img src="${IP}${nm}.png" onerror="this.style.display='none'">
      <div class="mrow-port-rm" onclick="removeCmp(${idx})">×</div>
    </div>
    <div class="mrow-info">
      <div class="mrow-name">${nm}</div>
      <div class="mrow-type ${TCLS[m.type]||''}">${TLBL[m.type]}</div>
      <div class="mrow-tagline">${genTagline(nm)}</div>
      <div class="mrow-score" style="color:${c}">${tot} <span style="font-size:.7rem;font-weight:400;color:var(--tx2)">/ ${MAX_T}</span></div>
      <div class="mrow-bar"><div class="mrow-barf" style="width:${Math.round(Math.min(r,1)*100)}%;background:${c}"></div></div>
    </div>
    <div class="mrow-div"></div>
    <div class="mrow-awk">
      ${a5?`<div class="awk-title lv5">Éveil 5★ <span style="display:flex;gap:3px;align-items:center">${a5.pvp?'<span class="mc-p">PvP</span>':''}${a5.pve?'<span class="mc-e">PvE</span>':''}<span class="awk-pts-badge" style="color:${sCol(pts5/100)};background:var(--s3)">${pts5} pts</span></span></div>${buffChips(a5.buffs||[])}`:
      '<div style="color:var(--tx2);font-size:.72rem;font-style:italic">—</div>'}
    </div>
    <div class="mrow-div"></div>
    <div class="mrow-awk">
      ${a7?`<div class="awk-title lv7">Éveil 7★ <span style="display:flex;gap:3px;align-items:center">${a7.pvp?'<span class="mc-p">PvP</span>':''}${a7.pve?'<span class="mc-e">PvE</span>':''}<span class="awk-pts-badge" style="color:${sCol(pts7/100)};background:var(--s3)">${pts7} pts</span></span></div>${buffChips(a7.buffs||[])}`:
      '<div style="color:var(--tx2);font-size:.72rem;font-style:italic">—</div>'}
    </div>
  </div>`;
}

function renderCmp(){
  const filled=selCmp.filter(Boolean);
  const scores=selCmp.map(nm=>nm?totPts(MONSTERS[nm]):0);
  const maxS=Math.max(...scores.filter(Boolean),1);
  const list=document.getElementById('cmpList');
  const bot=document.getElementById('cmpBot');
  const sb=document.getElementById('cmpShared');

  if(!filled.length){
    list.innerHTML='<div class="cmp-empty">Cliquez sur des portraits pour comparer jusqu\'à 3 monstres</div>';
    if(bot)bot.innerHTML='';
    if(sb)sb.className='';
    return;
  }

  list.innerHTML=selCmp.map((nm,i)=>nm?renderCmpRow(nm,i):'').filter(Boolean).join('');

  if(sb){
    if(filled.length>=2){
      const bsets=filled.map(nm=>new Set((MONSTERS[nm].awakenings||[]).filter(a=>a.level!==3).flatMap(a=>a.buffs||[])));
      const shared=[...bsets[0]].filter(b=>bsets.every(s=>s.has(b)));
      if(shared.length){
        sb.className='show';
        document.getElementById('sharedChips').innerHTML=shared.map(id=>{
          const b=BUFFS[id];if(!b)return'';
          return`<span class="shchip" style="background:rgba(${rgb(b.color)},.12);color:${b.color};border:1px solid rgba(${rgb(b.color)},.25)">${b.label}</span>`;
        }).join('');
      }else sb.className='';
    }else sb.className='';
  }

  if(!bot)return;
  if(filled.length<2){bot.innerHTML='';return;}
  const r2=[...selCmp.map((nm,i)=>({nm,s:scores[i],c:SCOLS[i]}))].filter(x=>x.nm).sort((a,b)=>b.s-a.s);
  bot.innerHTML=`<span style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2);flex-shrink:0">Score</span>`+
    r2.map(r=>`<div class="bseg"><div class="bseg-n" style="color:${r.c}">${r.nm} <span style="opacity:.35;font-weight:400">${r.s}</span></div><div class="bseg-b"><div class="bseg-f" style="width:${Math.round(r.s/maxS*100)}%;background:${r.c}"></div></div></div>`).join('');
}
function removeCmp(i){selCmp[i]=null;renderCmp();buildGrid();}

/* ══ TEAM BUILDER ══ */
function setSize(s){
  teamSize=s;
  document.querySelectorAll('#szRow .sz').forEach(b=>b.classList.toggle('on',+b.dataset.s===s));
  if(selTb.length>s)selTb=selTb.slice(0,s);
  renderTeam();buildGrid();
}
function clearTeam(){selTb=[];renderTeam();buildGrid();}

function renderTeam(){
  const n=selTb.length;
  document.getElementById('tbCtr').textContent=`${n} / ${teamSize}`;
  document.getElementById('tbClrBtn').disabled=n===0;
  const slots=document.getElementById('tbSlots');
  let h='';
  for(let i=0;i<teamSize;i++){
    if(i<n){
      const nm=selTb[i];
      h+=`<div class="tslot filled">
        <img src="${IP}${nm}.png" onerror="this.style.display='none'">
        <div class="tslot-name">${nm}</div>
        <div class="tslot-rm" onclick="rmTb('${nm}')">×</div>
      </div>`;
    }else{
      h+=`<div class="tslot"><span class="tslot-plus">+</span></div>`;
    }
  }
  slots.innerHTML=h;

  const syn=document.getElementById('tbSyn');
  if(!n){
    syn.innerHTML='<div class="syn-empty" id="synEmpty">Ajoutez des monstres pour voir les synergies</div>';
    return;
  }

  const agg={};
  selTb.forEach(nm=>{
    const seen=new Set();
    (MONSTERS[nm].awakenings||[]).filter(a=>a.level!==3).forEach(a=>{
      (a.buffs||[]).forEach(id=>{
        if(!seen.has(id)){
          seen.add(id);
          if(!agg[id])agg[id]={count:0,ms:[]};
          agg[id].count++;
          agg[id].ms.push(nm);
        }
      });
    });
  });

  const co=b=>b.team?0:b.cond?2:1;
  const sorted=Object.entries(agg).sort(([ai,ad],[bi,bd])=>{
    const ba=BUFFS[ai],bb=BUFFS[bi],ca=co(ba||{}),cb=co(bb||{});
    if(ca!==cb)return ca-cb;
    if(bd.count!==ad.count)return bd.count-ad.count;
    return(bb?.power||0)-(ba?.power||0);
  });
  const cats=[
    {k:0,label:'Buffs d\'équipe',color:'var(--gold)'},
    {k:1,label:'Buffs personnels',color:'var(--tx3)'},
    {k:2,label:'Conditionnels',color:'#a09020'}
  ];
  const ce={0:[],1:[],2:[]};
  sorted.forEach(e=>{const b=BUFFS[e[0]];if(b)ce[co(b)].push(e);});

  syn.innerHTML=cats.filter(c=>ce[c.k].length).map(cat=>`
    <div class="syn-section">
      <div class="syn-section-title" style="color:${cat.color}">${cat.label} <span style="font-size:.62rem;color:var(--tx2);font-weight:400">(${ce[cat.k].length})</span></div>
      <div class="syn-grid">
        ${ce[cat.k].map(([id,{count,ms}])=>{
          const b=BUFFS[id];if(!b)return'';
          const src=ms.slice(0,2).join(', ')+(ms.length>2?` +${ms.length-2}`:'');
          return`<div class="syn-row${b.cond?' cond':''}">
            <div class="syn-dot" style="background:${b.color}"></div>
            <span class="syn-lbl">${b.label}</span>
            <span class="syn-src">${src}</span>
            <span class="syn-cnt" style="color:${b.color}">×${count}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function rmTb(nm){selTb=selTb.filter(n=>n!==nm);renderTeam();buildGrid();}

/* ══ TIER LIST ══ */
function renderTierList(){
  const content=document.getElementById('tlContent');
  content.innerHTML=TIERS.map(t=>`
    <div class="trow">
      <div class="trow-lbl" style="background:${t.bg}">${t.label}</div>
      <div class="trow-drop" id="tier-${t.id}"
        ondragover="tlDragOver(event,'${t.id}')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="tlDrop(event,'${t.id}')">
        ${tlData[t.id].map(nm=>tlPcHTML(nm,t.id)).join('')}
      </div>
    </div>`).join('');
  document.getElementById('tlPool').style.display='none';

  // indique dans la sidebar quels monstres sont déjà placés (badge tier)
  buildGrid();
}

function tlPcHTML(nm,tierId){
  return`<div class="tl-pc" draggable="true"
    ondragstart="tlTierDragStart(event,'${nm}','${tierId}')"
    ondragend="tlDragEnd()">
    <img src="${IP}${nm}.png" onerror="this.src=''">
    <div class="tl-pc-name">${nm}</div>
    <div class="tl-pc-rm" onclick="tlRemove('${nm}','${tierId}')">×</div>
  </div>`;
}
function tlPoolDragStart(e,nm){tlDragName=nm;tlDragFrom='pool';e.dataTransfer.effectAllowed='move';}
function tlTierDragStart(e,nm,from){tlDragName=nm;tlDragFrom=from;e.dataTransfer.effectAllowed='move';}
function tlDragEnd(){tlDragName=null;tlDragFrom=null;}
function tlDragOver(e,tid){e.preventDefault();document.getElementById('tier-'+tid).classList.add('drag-over');}
function tlDrop(e,tid){
  e.preventDefault();
  document.getElementById('tier-'+tid).classList.remove('drag-over');
  if(!tlDragName)return;
  if(tlDragFrom&&tlDragFrom!=='pool')tlData[tlDragFrom]=tlData[tlDragFrom].filter(n=>n!==tlDragName);
  if(!tlData[tid].includes(tlDragName))tlData[tid].push(tlDragName);
  renderTierList();buildGrid();
}
function tlRemove(nm,tid){tlData[tid]=tlData[tid].filter(n=>n!==nm);renderTierList();buildGrid();}
function resetTier(){TIERS.forEach(t=>tlData[t.id]=[]);renderTierList();buildGrid();}

/* ── INIT ── */
buildGrid();renderCmp();renderTeam();
</script>

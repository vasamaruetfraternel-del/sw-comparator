<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Rush – Comparateur v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#080d17;--surface:#0d1422;--surface2:#111928;--surface3:#171f30;
  --border:#1e2a3e;--border2:#263650;
  --gold:#c8963c;--gold-lt:#e8b860;--gold-glow:rgba(200,150,60,.18);
  --text:#ccd6f0;--text2:#7888a8;--text3:#9aabcc;
  --left:#3d6fff;--right:#ff5522;
  --melee:#d95050;--tank:#4080cc;--range:#c89030;--support:#50a860;
  --pvp:#c04040;--pve:#2e9090;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* ── Header ─────────────────────────────────────────────── */
header{height:50px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 14px;gap:10px}
.hbtn{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .15s;flex-shrink:0}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.logo{display:flex;align-items:center;gap:8px}
.logo svg{color:var(--gold)}
.logo-text{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-lt);letter-spacing:2px}
.hsep{width:1px;height:22px;background:var(--border2)}
.hhint{font-size:.75rem;color:var(--text2)}
/* ── Layout ──────────────────────────────────────────────── */
.layout{display:flex;flex:1;overflow:hidden}
/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease}
.sidebar.collapsed{width:0}
.search-box{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-inner{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;transition:border-color .2s}
.search-inner:focus-within{border-color:var(--gold)}
.search-inner svg{flex-shrink:0;color:var(--text2)}
.search-inner input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;width:100%}
.search-inner input::placeholder{color:var(--text2)}
.type-filter{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.tf{font-family:'Inter',sans-serif;font-size:.68rem;font-weight:600;padding:5px 4px;border-radius:7px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.tf:hover{color:var(--text);background:var(--surface2)}
.tf.all{grid-column:1/-1}
.tf.active-all{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-glow)}
.tf.active-melee{border-color:var(--melee);color:var(--melee);background:rgba(217,80,80,.1)}
.tf.active-tank{border-color:var(--tank);color:var(--tank);background:rgba(64,128,204,.1)}
.tf.active-range{border-color:var(--range);color:var(--range);background:rgba(200,144,48,.1)}
.tf.active-support{border-color:var(--support);color:var(--support);background:rgba(80,168,96,.1)}
.monster-list{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:3px}
.monster-list::-webkit-scrollbar{width:3px}
.monster-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.m-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.m-row:hover{background:var(--surface2);border-color:var(--border2)}
.m-row.sel-l{background:rgba(61,111,255,.1);border-color:rgba(61,111,255,.55)}
.m-row.sel-r{background:rgba(255,85,34,.1);border-color:rgba(255,85,34,.55)}
.m-avatar{width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border2)}
.m-avatar-ph{width:38px;height:38px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--text2);flex-shrink:0;border:1px solid var(--border);text-align:center;line-height:1.3;padding:2px}
.m-row-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.m-row-sub{display:flex;align-items:center;gap:4px;margin-top:3px}
/* ── Pills ───────────────────────────────────────────────── */
.pill{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap}
.pill-melee{color:var(--melee);border-color:rgba(217,80,80,.4);background:rgba(217,80,80,.1)}
.pill-tank{color:var(--tank);border-color:rgba(64,128,204,.4);background:rgba(64,128,204,.1)}
.pill-range{color:var(--range);border-color:rgba(200,144,48,.4);background:rgba(200,144,48,.1)}
.pill-support{color:var(--support);border-color:rgba(80,168,96,.4);background:rgba(80,168,96,.1)}
/* ── Compare area ────────────────────────────────────────── */
.compare{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.compare-scroll{flex:1;overflow-y:auto;padding:18px 20px}
.compare-scroll::-webkit-scrollbar{width:4px}
.compare-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* Empty */
.empty-state{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2);font-size:.9rem}
.empty-ring{width:64px;height:64px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;opacity:.45}
/* ── Monster header cards ────────────────────────────────── */
.compare-header-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px}
.monster-hcard{flex:1;background:rgba(255,255,255,.025);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.monster-hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.monster-hcard.side-l::before{background:linear-gradient(90deg,transparent,var(--left),transparent)}
.monster-hcard.side-r::before{background:linear-gradient(90deg,transparent,var(--right),transparent)}
.monster-hcard.winner{border-color:rgba(80,168,96,.55);box-shadow:0 0 24px rgba(80,168,96,.12)}
.hcard-inner{display:flex;gap:14px;align-items:center}
.card-portrait{width:72px;height:72px;border-radius:10px;object-fit:cover;border:1px solid var(--border2);flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.card-portrait-ph{width:72px;height:72px;border-radius:10px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--text2);border:1px solid var(--border);flex-shrink:0;text-align:center}
.card-meta{flex:1;min-width:0}
.card-name{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold-lt);letter-spacing:1px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-top:10px;margin-bottom:3px}
.score-num{font-size:2.1rem;font-weight:700;line-height:1}
.score-denom{font-size:.75rem;color:var(--text2);margin-left:4px}
.score-bar-track{height:6px;background:var(--surface3);border-radius:4px;overflow:hidden;margin-top:8px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.winner-badge{position:absolute;top:10px;right:12px;font-size:.68rem;font-weight:700;color:#50a860;background:rgba(80,168,96,.15);border:1px solid rgba(80,168,96,.35);border-radius:20px;padding:2px 8px;letter-spacing:.5px}
/* ── Radar chart ─────────────────────────────────────────── */
.radar-wrap{flex-shrink:0;width:320px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:8px;padding-top:2px}
.radar-legend{display:flex;gap:16px;font-size:.75rem;color:var(--text3);font-weight:600}
.rdot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;vertical-align:middle}
/* ── Sec label ───────────────────────────────────────────── */
.sec-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── Awakening pair rows ─────────────────────────────────── */
.awk-pair-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;align-items:stretch}
.awk-pair-cell{display:flex;flex-direction:column}
.awk-pair-cell .awk{flex:1}
/* ── Awakening card (glassmorphism) ──────────────────────── */
.awk{background:rgba(255,255,255,.025);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.055);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden}
.awk::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
.awk.lv3::before{background:#4466aa}
.awk.lv5::before{background:var(--gold)}
.awk.lv7::before{background:#cc3355}
.awk-head{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.awk-lv{font-family:'Cinzel',serif;font-size:.64rem;font-weight:700;color:var(--gold);border:1px solid rgba(200,150,60,.35);background:var(--gold-glow);border-radius:6px;padding:3px 9px;flex-shrink:0}
.awk-score{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:6px;border:1px solid;flex-shrink:0}
.awk-modes{display:flex;gap:4px;margin-left:auto}
.mode-pvp{font-size:.62rem;padding:2px 8px;border-radius:6px;font-weight:700;color:var(--pvp);background:rgba(192,64,64,.12);border:1px solid rgba(192,64,64,.35)}
.mode-pve{font-size:.62rem;padding:2px 8px;border-radius:6px;font-weight:700;color:var(--pve);background:rgba(46,144,144,.12);border:1px solid rgba(46,144,144,.35)}
.awk-desc{white-space:pre-line;font-size:.82rem;line-height:1.75;color:var(--text3);margin-bottom:10px}
.awk-desc .vp{color:var(--text);font-weight:700}
.awk-desc .vm{color:#ff8855;font-weight:700}
.buff-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.buff-chip{font-size:.63rem;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid;cursor:default;transition:opacity .15s}
.buff-chip:hover{opacity:.8}
.awk-bar{display:flex;align-items:center;gap:10px}
.awk-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.awk-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.awk-bar-val{font-size:.65rem;font-weight:700;width:52px;text-align:right;flex-shrink:0}
/* ── Single monster view ─────────────────────────────────── */
.single-wrap{max-width:580px;margin:0 auto;width:100%}
.single-hcard{background:rgba(255,255,255,.025);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px;margin-bottom:20px;position:relative;overflow:hidden}
.single-hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
/* ── Bottom bar ──────────────────────────────────────────── */
.bottom{height:46px;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;padding:0 20px;gap:12px}
.bottom-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);flex-shrink:0}
.bottom-hint{font-size:.8rem;color:var(--text2);flex:1;text-align:center}
.bottom-name{font-size:.78rem;font-weight:700;min-width:84px;flex-shrink:0}
.bottom-name.l{color:var(--left);text-align:right}
.bottom-name.r{color:var(--right)}
.bottom-bars{flex:1;display:flex;gap:2px;align-items:center}
.bar-l{height:12px;border-radius:3px 0 0 3px;background:var(--left);opacity:.85;transition:width .6s}
.bar-r{height:12px;border-radius:0 3px 3px 0;background:var(--right);opacity:.85;transition:width .6s}
</style>
</head>
<body>
<script>
const IMAGES_PATH="./images/";
const BUFFS={
"atk_up":{label:"ATQ ↑",desc:"Augmente l'ATQ.",color:"#d95050",power:10},
"atk_spd_up":{label:"Vit. ATQ ↑",desc:"Augmente la vitesse d'attaque.",color:"#e07030",power:9},
"crit_up":{label:"Coup puissant ↑",desc:"Augmente le taux de coup puissant.",color:"#c8a830",power:10},
"crit_dmg_up":{label:"Dég. critiques ↑",desc:"Augmente les dégâts des coups critiques.",color:"#c8b840",power:14},
"crush_dmg_up":{label:"Dég. puissants ↑",desc:"Augmente les dégâts des coups puissants.",color:"#c8b840",power:13},

"bleed":{label:"Saignement",desc:"DoT % PV max ennemis.",color:"#b02020",power:13},
"frost_trace":{label:"Trace de givre",desc:"Détection de faiblesse – Trace de givre.",color:"#80ccee",power:12},
"freeze_weak":{label:"Faiblesse gel",desc:"Détection de point faible – Congélation.",color:"#50aaee",power:12},

"debuff_scaling":{label:"Dég. / debuffs",desc:"Dégâts bonus selon les debuffs sur la cible.",color:"#d07030",power:15},
"single_target_dmg":{label:"Dég. cible unique ↑",desc:"Dégâts supplémentaires contre les cibles uniques.",color:"#cc5030",power:12},
"cc_boost":{label:"Contrôle ↑",desc:"Augmente l'efficacité des effets de contrôle.",color:"#d09030",power:13},
"petrify_dmg":{label:"Dég. pétrification",desc:"Dégâts augmentés sur cibles pétrifiées.",color:"#a09050",power:12},
"aoe_dmg_recv":{label:"Dég. zone reçus ↑",desc:"Dégâts de zone reçus augmentés (ennemi).",color:"#d06030",power:11},
"crit_recv_up":{label:"Dég. crit reçus ↑",desc:"Dégâts critiques reçus augmentés (ennemi).",color:"#d08030",power:13},
"dmg_resist_up":{label:"Résist. dégâts ↑",desc:"Réduit fortement les dégâts reçus pendant une courte durée.",color:"#5588cc",power:14},
"giclée":{label:"Giclée",desc:"Les attaques éclaboussent les cibles adjacentes.",color:"#dd5588",power:13},
"happy_box":{label:"Happy box",desc:"Charge cumulative obtenue sur coup puissant (CD : 2s).",color:"#ffaa44",power:10},
"merry_box":{label:"Merry box",desc:"À 5 cumuls : confère aux alliés ATQ ↑, Dég. puissants ↑ et Coup puissant ↑ 4s.",color:"#ff88cc",power:14},
"fox_fire":{label:"Feu du renard",desc:"Accumule des charges pour déclencher la compétence critique.",color:"#ff8c42",power:16},
"overmax_fox_fire":{label:"Feu du renard x20",desc:"Toutes les charges sont consommées pour utiliser la compétence critique 2 fois.",color:"#ff8c42",power:26},
"burn_weak":{label:"Faiblesse brûlure",desc:"Détection de point faible – Brûlure.",color:"#ff6622",power:12},
"burn_vuln":{label:"Vuln. brûlures",desc:"La cible subit des dégâts augmentés des effets de brûlure.",color:"#dd4400",power:12},
"poison_weak":{label:"Faiblesse poison",desc:"Détection de point faible – Empoisonnement.",color:"#88cc44",power:12},
"poison_vuln":{label:"Vuln. empoisonnement",desc:"La cible subit des dégâts augmentés des effets d'empoisonnement.",color:"#66aa22",power:12},

"aoe_range_up":{label:"Rayon zone ↑",desc:"Augmente le rayon des dégâts de zone.",color:"#66ddaa",power:11},
"aoe_hit_scaling":{label:"Dég. / cibles touchées",desc:"Dégâts +30% par ennemi touché (max 10 ennemis).",color:"#ddaa66",power:14},
};
const AWK3={level:3,desc:"Réduit de 100% le temps de recharge de ses compétences au début du combat.",buffs:["cd_reset"],pvp:true,pve:true};
const MONSTERS={
"Craka":{image:"",type:"melee",awakenings:[AWK3,{level:5,desc:"Début de combat : \n- ATQ +10% (cumulable). \n- Réduc. dégâts longue portée -30% (suppression impossible, cumulable). \n- Chaque application de saignement accorde à un allié « Détection point faible – Saignement 10% » pendant 10s (cumulable).",buffs:["atk_up","def_up","bleed"],pvp:true,pve:false},{level:7,desc:"Attaque réussie : \n- Applique « Point faible – Saignement 15% » 10s (suppression impossible, cumulable). \n- Dégâts infligés +20% (suppression impossible, cumulable).",buffs:["bleed","dmg_up"],pvp:true,pve:false}]},
"Mago":{image:"",type:"melee",awakenings:[AWK3,{level:5,desc:"Début de combat : \n- Esquive absolue 3s. \n- ATQ +10% (suppression impossible, cumulable). \n- Sous Furtivité : Taux de coup puissant +10% pendant 3s (suppression impossible, cumulable).",buffs:["dodge","atk_spd_up","stealth","crit_up"],pvp:true,pve:false},{level:7,desc:"Sous Furtivité : \n- Dégâts infligés +150% pendant 3s (suppression impossible, cumulable). \n- Attaque réussie : Dégâts des coups puissants +20% pendant 10s (cumulable). \n- Dégâts infligés +20% (suppression impossible, cumulable).",buffs:["dmg_up","crit_dmg_up","stealth"],pvp:true,pve:false}]},
"Grogen":{image:"",type:"range",awakenings:[AWK3,{level:5,desc:"Coup puissant réussi : \n- Accélération des compétences +20% pendant 2s (cumulable).",buffs:["skill_accel"],pvp:true,pve:true},{level:7,desc:"Attaque réussie : \n- Efficacité des effets de contrôle +20% et Dégâts sur cibles pétrifiées +20% pendant 10s (cumulable). \n- Dégâts infligés +20% (suppression impossible, cumulable).",buffs:["cc_boost","petrify_dmg","dmg_up"],pvp:true,pve:false}]},

<script>
// ── Stub (ancien radar supprimé) ────────────────────────────
function drawRadar(){}
// ── Bilan categories ────────────────────────────────────────
const BILAN_CATS=[
  {key:'dmg',   label:'Dégâts',    icon:'⚔️', buffs:['dmg_up','atk_up','crit_dmg_up','crush_dmg_up','crit_up','triple_hit','double_hit','yang_energy','no_crit_cd','fox_fire','overmax_fox_fire','single_target_dmg','aoe_hit_scaling','buff_scaling','debuff_scaling','giclée','bleed']},
  {key:'speed', label:'Vitesse',   icon:'⚡', buffs:['atk_spd_up','move_spd_up','cd_reset','skill_accel']},
  {key:'range', label:'Portée',    icon:'🎯', buffs:['range_up','aoe_range_up']},
  {key:'surv',  label:'Survie',    icon:'🛡️', buffs:['dodge','stealth','stealth_shield','count_shield','endurance_shield','dmg_resist_up','def_up','range_dmg_reduce','cc_immune']},
  {key:'util',  label:'Utilité éq.',icon:'🤝', buffs:['cc_boost','petrify_dmg','freeze_weak','frost_trace','burn_weak','burn_vuln','poison_weak','poison_vuln','aoe_dmg_recv','crit_recv_up','merry_box','happy_box','rockstar']},
];
function catScore(name,buffs){let t=0;(MONSTERS[name].awakenings||[]).forEach(a=>(a.buffs||[]).forEach(b=>{if(buffs.includes(b)&&BUFFS[b])t+=BUFFS[b].power}));return t;}
const CAT_MAX={};
BILAN_CATS.forEach(c=>{CAT_MAX[c.key]=Math.max(1,...Object.keys(MONSTERS).map(n=>catScore(n,c.buffs)))});

// unique buffs a monster brings that the other doesn't
function uniqueBuffs(name,other){
  const mine=new Set((MONSTERS[name].awakenings||[]).flatMap(a=>a.buffs||[]));
  const theirs=new Set((MONSTERS[other].awakenings||[]).flatMap(a=>a.buffs||[]));
  return[...mine].filter(b=>!theirs.has(b)&&BUFFS[b]);
}

function modeInfo(name){
  const m=MONSTERS[name];
  let pvp=false,pve=false;
  (m.awakenings||[]).forEach(a=>{if(a.pvp)pvp=true;if(a.pve)pve=true;});
  return{pvp,pve};
}

function renderBilan(nL,nR){
  const totL=totalPts(MONSTERS[nL]),totR=totalPts(MONSTERS[nR]);
  const diff=Math.abs(totL-totR);
  const winner=totL>totR?nL:totR>totL?nR:null;
  const winColor=totL>totR?'var(--left)':totR>totL?'var(--right)':'var(--gold)';

  // verdict text
  let verdictText='';
  if(!winner) verdictText=`Score identique — les deux monstres sont équivalents en puissance globale.`;
  else if(diff<15) verdictText=`<span style="color:${winColor};font-weight:700">${winner}</span> est légèrement supérieur (+${diff} pts), les deux restent très proches.`;
  else if(diff<35) verdictText=`<span style="color:${winColor};font-weight:700">${winner}</span> prend l'avantage avec <strong>+${diff} pts</strong> d'écart.`;
  else verdictText=`<span style="color:${winColor};font-weight:700">${winner}</span> domine clairement avec <strong>+${diff} pts</strong> d'écart.`;

  let catRows=''; // stub — ancien système supprimé
  // ── helpers
  function allBuffsOf(name){
    const seen=new Set(),out=[];
    (MONSTERS[name].awakenings||[]).forEach(a=>(a.buffs||[]).forEach(b=>{if(BUFFS[b]&&!seen.has(b)){seen.add(b);out.push(b);}}));
    return out;
  }
  function chipRow(ids){
    if(!ids.length) return`<span style="color:var(--text2);font-size:.75rem;font-style:italic">—</span>`;
    return ids.map(b=>{const bf=BUFFS[b];return`<span class="buff-chip" style="color:${bf.color};border-color:${bf.color};background:rgba(${rgb(bf.color)},.1)" title="${bf.desc}">${bf.label}</span>`;}).join('');
  }
  function check(col){return`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;}
  function cross(){return`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;}
  const ROLE_LABEL={melee:'Mêlée',tank:'Tank',range:'Range',support:'Support'};
  const ROLE_COL={melee:'var(--melee)',tank:'var(--tank)',range:'var(--range)',support:'var(--support)'};

  // unique buffs
  const uL=uniqueBuffs(nL,nR),uR=uniqueBuffs(nR,nL);
  const uChipL=uL.map(b=>`<span class="buff-chip" style="color:${BUFFS[b].color};border-color:${BUFFS[b].color};background:rgba(61,111,255,.08)" title="${BUFFS[b].desc}">${BUFFS[b].label}</span>`).join('')||'<span style="color:var(--text2);font-size:.75rem">Aucun buff exclusif</span>';
  const uChipR=uR.map(b=>`<span class="buff-chip" style="color:${BUFFS[b].color};border-color:${BUFFS[b].color};background:rgba(255,85,34,.08)" title="${BUFFS[b].desc}">${BUFFS[b].label}</span>`).join('')||'<span style="color:var(--text2);font-size:.75rem">Aucun buff exclusif</span>';

  // PvP / PvE recommendation
  const mL=modeInfo(nL),mR=modeInfo(nR);
  function modeTag(ok,mode,col){return ok?`<span style="font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px;color:${col};background:${col}22;border:1px solid ${col}55">${mode}</span>`:`<span style="font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px;color:var(--text2);background:var(--surface3);border:1px solid var(--border)">${mode} ✗</span>`;}

  return`<div style="background:rgba(255,255,255,.022);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:18px 20px;width:100%;margin-bottom:20px">

    <!-- verdict -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
      <div style="width:32px;height:32px;border-radius:50%;background:${winColor}22;border:1px solid ${winColor}55;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem">⚖️</div>
      <div>
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:3px">Verdict</div>
        <div style="font-size:.85rem;line-height:1.5;color:var(--text)">${verdictText}</div>
      </div>
    </div>

    <!-- cat comparison -->
    <div style="margin-bottom:16px">${catRows}</div>

    <!-- unique buffs -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;padding-top:4px">
      <div>
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--left);margin-bottom:7px">✦ Exclusivités ${nL}</div>
        <div class="buff-list">${uChipL}</div>
      </div>
      <div>
        <div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--right);margin-bottom:7px">✦ Exclusivités ${nR}</div>
        <div class="buff-list">${uChipR}</div>
      </div>
    </div>

    <!-- mode reco -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:.78rem;font-weight:600;color:var(--left)">${nL}</span>
        <div style="display:flex;gap:5px">${modeTag(mL.pvp,'PvP','var(--pvp)')}${modeTag(mL.pve,'PvE','var(--pve)')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:.78rem;font-weight:600;color:var(--right)">${nR}</span>
        <div style="display:flex;gap:5px">${modeTag(mR.pvp,'PvP','var(--pvp)')}${modeTag(mR.pve,'PvE','var(--pve)')}</div>
      </div>
    </div>
  </div>`;
}

// ── Score helpers ───────────────────────────────────────────
function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`}
function awkRaw(a){return(a.buffs||[]).reduce((s,id)=>s+(BUFFS[id]?BUFFS[id].power:0),0)}
const MAX_AWK=Math.max(...Object.values(MONSTERS).flatMap(m=>(m.awakenings||[]).map(a=>awkRaw(a))));
function awkPts(a){return Math.round(awkRaw(a)/MAX_AWK*100)}
function totalPts(m){return(m.awakenings||[]).reduce((s,a)=>s+awkPts(a),0)}
const MAX_TOTAL=300;
function scoreCol(r){return r>=.7?'#50a860':r>=.4?'#c8963c':'#c04040'}
function scoreGrad(r){return r>=.7?'linear-gradient(90deg,#287030,#50a860)':r>=.4?'linear-gradient(90deg,#7a5010,#c8963c)':'linear-gradient(90deg,#702020,#c04040)'}

function hDesc(t){
  return t
    .replace(/(\+\d+(?:,\d+)?%)/g,'<span class="vp">$1</span>')
    .replace(/(-\d+(?:,\d+)?%)/g,'<span class="vm">$1</span>');
}

function chips(ids){
  return(ids||[]).map(id=>{const b=BUFFS[id];if(!b)return'';return`<span class="buff-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.12)" title="${b.desc} · Puissance : ${b.power}">${b.label}</span>`}).join('');
}

const ROLE={melee:{label:'Mêlée',cls:'pill-melee'},tank:{label:'Tank',cls:'pill-tank'},range:{label:'Range',cls:'pill-range'},support:{label:'Support',cls:'pill-support'}};

function awkHTML(a,lvCls){
  const pts=awkPts(a),ar=pts/100,ac=scoreCol(ar),ag=scoreGrad(ar),ch=chips(a.buffs||[]);
  return`<div class="awk ${lvCls}">
    <div class="awk-head">
      <span class="awk-lv">Éveil ${a.level}</span>
      <span class="awk-score" style="color:${ac};border-color:${ac};background:rgba(${rgb(ac)},.1)">⚡ ${pts} pts</span>
      <div class="awk-modes">${a.pvp?'<span class="mode-pvp">PvP</span>':''}${a.pve?'<span class="mode-pve">PvE</span>':''}</div>
    </div>
    <div class="awk-desc">${hDesc(a.desc)}</div>
    ${ch?`<div class="buff-list">${ch}</div>`:''}
    <div class="awk-bar">
      <div class="awk-bar-track"><div class="awk-bar-fill" style="width:${Math.min(ar*100,100)}%;background:${ag}"></div></div>
      <span class="awk-bar-val" style="color:${ac}">${pts}/100</span>
    </div>
  </div>`;
}

function lvCls(lv){return lv===3?'lv3':lv===5?'lv5':'lv7'}

function renderMonsterHcard(name,side,winner){
  const m=MONSTERS[name],tot=totalPts(m),r=tot/MAX_TOTAL,c=scoreCol(r),g=scoreGrad(r),role=ROLE[m.type]||{label:m.type,cls:''};
  return`<div class="monster-hcard side-${side}${winner?' winner':''}">
    ${winner?`<span class="winner-badge">★ Meilleur score</span>`:''}
    <div class="hcard-inner">
      <img class="card-portrait" src="${IMAGES_PATH}${name}.png" alt="${name}" onerror="this.outerHTML='<div class=card-portrait-ph>${name}</div>'">
      <div class="card-meta">
        <div class="card-name">${name}</div>
        <span class="pill ${role.cls}">${role.label}</span>
        <div class="score-label">Score total</div>
        <div><span class="score-num" style="color:${c}">${tot}</span><span class="score-denom">/ ${MAX_TOTAL}</span></div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.min(r*100,100)}%;background:${g}"></div></div>
      </div>
    </div>
  </div>`;
}

function renderSingle(name){
  const m=MONSTERS[name],tot=totalPts(m),r=tot/MAX_TOTAL,c=scoreCol(r),g=scoreGrad(r),role=ROLE[m.type]||{label:m.type,cls:''};
  let html=`<div class="single-wrap">
    <div class="single-hcard">
      <div class="hcard-inner">
        <img class="card-portrait" src="${IMAGES_PATH}${name}.png" alt="${name}" onerror="this.outerHTML='<div class=card-portrait-ph>${name}</div>'">
        <div class="card-meta">
          <div class="card-name">${name}</div>
          <span class="pill ${role.cls}">${role.label}</span>
          <div class="score-label">Score total</div>
          <div><span class="score-num" style="color:${c}">${tot}</span><span class="score-denom">/ ${MAX_TOTAL}</span></div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${Math.min(r*100,100)}%;background:${g}"></div></div>
        </div>
      </div>
    </div>
    <div class="sec-label">Éveils · ${(m.awakenings||[]).length}</div>`;
  (m.awakenings||[]).forEach(a=>{html+=awkHTML(a,lvCls(a.level))});
  html+=`</div>`;
  return html;
}

function renderDuo(nL,nR){
  const mL=MONSTERS[nL],mR=MONSTERS[nR];
  const totL=totalPts(mL),totR=totalPts(mR);
  const winL=totL>totR,winR=totR>totL;
  let html=`<div class="compare-header-row">
    ${renderMonsterHcard(nL,'l',winL)}
    ${renderMonsterHcard(nR,'r',winR)}
  </div>
  ${renderBilan(nL,nR)}
  <div class="sec-label">Éveils comparés</div>`;
  const maxA=Math.max(mL.awakenings.length,mR.awakenings.length);
  for(let i=0;i<maxA;i++){
    const aL=mL.awakenings[i],aR=mR.awakenings[i];
    const lv=aL?aL.level:aR.level;
    html+=`<div class="awk-pair-row">
      <div class="awk-pair-cell">${aL?awkHTML(aL,lvCls(lv)):`<div class="awk ${lvCls(lv)}" style="opacity:.25;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.8rem">—</div>`}</div>
      <div class="awk-pair-cell">${aR?awkHTML(aR,lvCls(lv)):`<div class="awk ${lvCls(lv)}" style="opacity:.25;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.8rem">—</div>`}</div>
    </div>`;
  }
  return html;
}

// ── State ───────────────────────────────────────────────────
let sel={left:null,right:null},nextSlot='left',activeType='';

function updateCompare(){
  const cs=document.getElementById('compareScroll');
  if(!sel.left&&!sel.right){cs.innerHTML=`<div class="empty-state"><div class="empty-ring"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>Sélectionnez un monstre dans la liste</div>`;return;}
  if(sel.left&&sel.right){cs.innerHTML=renderDuo(sel.left,sel.right);}
  else{cs.innerHTML=renderSingle(sel.left||sel.right);}
}

function updateBottom(){
  const bot=document.getElementById('bottom');
  if(!sel.left||!sel.right){bot.innerHTML='<span class="bottom-hint">Sélectionnez deux monstres pour comparer</span>';return;}
  const lp=totalPts(MONSTERS[sel.left]),rp=totalPts(MONSTERS[sel.right]);
  const mx=Math.max(lp,rp)||1,lw=Math.round(lp/mx*46),rw=Math.round(rp/mx*46);
  bot.innerHTML=`<span class="bottom-label">Score</span>
    <span class="bottom-name l">${sel.left}<br><span style="font-size:.62rem;opacity:.6;font-weight:400">${lp} pts</span></span>
    <div class="bottom-bars"><div class="bar-l" style="width:${lw}%"></div><div class="bar-r" style="width:${rw}%"></div></div>
    <span class="bottom-name r">${sel.right}<br><span style="font-size:.62rem;opacity:.6;font-weight:400">${rp} pts</span></span>`;
}

function pick(name){
  if(sel.left===name){sel.left=null;nextSlot='left';}
  else if(sel.right===name){sel.right=null;nextSlot='right';}
  else{sel[nextSlot]=name;nextSlot=nextSlot==='left'?'right':'left';}
  refresh();updateCompare();updateBottom();
}

function refresh(){
  document.querySelectorAll('.m-row').forEach(el=>{
    el.classList.toggle('sel-l',sel.left===el.dataset.name);
    el.classList.toggle('sel-r',sel.right===el.dataset.name);
  });
}

function buildList(){
  const list=document.getElementById('monsterList'),q=document.getElementById('searchInput').value.toLowerCase();
  list.innerHTML='';
  const names=Object.keys(MONSTERS).filter(n=>(!activeType||MONSTERS[n].type===activeType)&&n.toLowerCase().includes(q));
  if(!names.length){list.innerHTML=`<div style="color:var(--text2);font-size:.78rem;padding:18px;text-align:center">Aucun résultat</div>`;return;}
  names.forEach(name=>{
    const m=MONSTERS[name],el=document.createElement('div');
    el.className='m-row';el.dataset.name=name;
    if(sel.left===name)el.classList.add('sel-l');
    if(sel.right===name)el.classList.add('sel-r');
    const role=ROLE[m.type]||{label:m.type,cls:''};
    el.innerHTML=`<img class="m-avatar" src="${IMAGES_PATH}${name}.png" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="m-avatar-ph" style="display:none">${name}</div>
      <div>
        <div class="m-row-name">${name}</div>
        <div class="m-row-sub"><span class="pill ${role.cls}">${role.label}</span></div>
      </div>`;
    el.onclick=()=>pick(name);
    list.appendChild(el);
  });
}

document.getElementById('typeFilter').addEventListener('click',e=>{
  const btn=e.target.closest('.tf');if(!btn)return;
  document.querySelectorAll('.tf').forEach(b=>{b.className='tf'+(b.classList.contains('all')?' all':'')});
  activeType=btn.dataset.type;
  btn.classList.add(activeType?`active-${activeType}`:'active-all');
  buildList();
});

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}

buildList();
</script>
</body>
</html>

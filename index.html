<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Rush – Comparateur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f1623;--surface:#151f30;--surface2:#1a2740;--surface3:#1e2e4a;
  --border:#243350;--border2:#2e4068;
  --gold:#d4a44a;--gold-lt:#ecc46a;--gold-glow:rgba(212,164,74,.15);
  --text:#d8e4f8;--text2:#6a82aa;--text3:#9ab0cc;
  --left:#4d7fff;--right:#ff5e2e;
  --melee:#e05555;--tank:#4d8fd6;--range:#d49828;--support:#52b86a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Header */
header{height:44px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 16px;gap:12px}
.logo-text{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold-lt);letter-spacing:2.5px}
.hsep{width:1px;height:20px;background:var(--border2)}
.hhint{font-size:.73rem;color:var(--text2)}
.toggle-btn{display:none;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 11px;color:var(--text3);font-size:.72rem;font-weight:600;cursor:pointer;margin-left:auto;transition:border-color .15s,color .15s}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold-lt)}
.toggle-btn .arr{transition:transform .25s}
.toggle-btn.open .arr{transform:rotate(180deg)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* Sidebar */
.sidebar{width:188px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.search-box{padding:8px;border-bottom:1px solid var(--border)}
.search-inner{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 10px;transition:border-color .2s}
.search-inner:focus-within{border-color:var(--gold)}
.search-inner svg{flex-shrink:0;color:var(--text2)}
.search-inner input{background:none;border:none;outline:none;color:var(--text);font-size:.8rem;width:100%;font-family:inherit}
.search-inner input::placeholder{color:var(--text2)}
.type-filter{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:6px 8px;border-bottom:1px solid var(--border)}
.tf{font-size:.64rem;font-weight:700;padding:5px 3px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.tf:hover{color:var(--text);background:var(--surface2)}
.tf.all{grid-column:1/-1}
.tf.active-all{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-glow)}
.tf.active-melee{border-color:var(--melee);color:var(--melee);background:rgba(224,85,85,.1)}
.tf.active-tank{border-color:var(--tank);color:var(--tank);background:rgba(77,143,214,.1)}
.tf.active-range{border-color:var(--range);color:var(--range);background:rgba(212,152,40,.1)}
.tf.active-support{border-color:var(--support);color:var(--support);background:rgba(82,184,106,.1)}
.monster-grid{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px;align-content:start}
.monster-grid::-webkit-scrollbar{width:3px}
.monster-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.m-tile{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;text-align:center}
.m-tile:hover{background:var(--surface2);border-color:var(--border2)}
.m-tile.sel-l{background:rgba(77,127,255,.1);border-color:rgba(77,127,255,.55)}
.m-tile.sel-r{background:rgba(255,94,46,.1);border-color:rgba(255,94,46,.55)}
.m-img{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--border2)}
.m-img-ph{width:46px;height:46px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.4rem;color:var(--text2);border:1px solid var(--border);line-height:1.3;padding:3px;text-align:center}
.m-name{font-size:.67rem;font-weight:600;color:var(--text3);line-height:1.2;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-dot{width:5px;height:5px;border-radius:50%}
.sel-num{font-size:.58rem;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-4px;right:-4px}

/* Compare area */
.compare{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:.88rem}
.empty-ring{width:58px;height:58px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;opacity:.35}

/* Scrollable content */
.cmp-scroll{flex:1;overflow-y:auto;padding:14px 16px 10px}
.cmp-scroll::-webkit-scrollbar{width:3px}
.cmp-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Monster header cards */
.heads{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.hcard{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.hcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.hcard.side-l::after{background:linear-gradient(90deg,transparent,var(--left),transparent)}
.hcard.side-r::after{background:linear-gradient(90deg,transparent,var(--right),transparent)}
.hcard.winner{border-color:rgba(82,184,106,.4)}
.hport{width:54px;height:54px;border-radius:9px;object-fit:cover;flex-shrink:0;border:1px solid var(--border2)}
.hport-ph{width:54px;height:54px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text2);border:1px solid var(--border);flex-shrink:0;text-align:center;padding:4px}
.hname{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold-lt);letter-spacing:.8px}
.htype-pill{display:inline-block;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;margin-top:3px}
.pill-melee{color:var(--melee);border-color:rgba(224,85,85,.35);background:rgba(224,85,85,.08)}
.pill-tank{color:var(--tank);border-color:rgba(77,143,214,.35);background:rgba(77,143,214,.08)}
.pill-range{color:var(--range);border-color:rgba(212,152,40,.35);background:rgba(212,152,40,.08)}
.pill-support{color:var(--support);border-color:rgba(82,184,106,.35);background:rgba(82,184,106,.08)}
.hscore{font-size:2rem;font-weight:700;line-height:1;margin-top:6px}
.hscore-den{font-size:.7rem;color:var(--text2);font-weight:400;margin-left:2px}
.hbar-wrap{margin-top:5px;height:4px;background:var(--surface3);border-radius:3px;overflow:hidden}
.hbar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.winner-badge{position:absolute;bottom:10px;right:12px;font-size:.62rem;font-weight:700;color:#52b86a;background:rgba(82,184,106,.12);border:1px solid rgba(82,184,106,.28);border-radius:20px;padding:2px 9px}

/* Verdict banner */
.verdict{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.82rem;line-height:1.5;display:flex;align-items:center;gap:8px}

/* Awakening comparison */
.awk-section{margin-bottom:10px}
.awk-level-header{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.awk-lv-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:5px 10px;border-radius:6px;display:flex;align-items:center;justify-content:space-between}
.awk-lv-label.lv5{background:rgba(212,164,74,.1);border:1px solid rgba(212,164,74,.25);color:var(--gold)}
.awk-lv-label.lv7{background:rgba(204,51,85,.1);border:1px solid rgba(204,51,85,.25);color:#dd5577}
.awk-lv-pts{font-size:.8rem;font-weight:700}
.awk-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.awk-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.awk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.awk-card.lv5::before{background:var(--gold)}
.awk-card.lv7::before{background:#cc3355}
.awk-desc{font-size:.78rem;line-height:1.65;color:var(--text3);white-space:pre-line;margin-bottom:10px}
.awk-desc .vp{color:var(--text);font-weight:600}
.awk-desc .vm{color:#ff9966;font-weight:600}
/* Buff list */
.buff-list{display:flex;flex-direction:column;gap:5px}
.buff-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;border:1px solid}
.buff-row.is-cond{border-style:dashed;opacity:.85}
.buff-icon{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.buff-label{flex:1;font-size:.76rem;font-weight:500;line-height:1.3}
.buff-tags{display:flex;gap:3px;flex-shrink:0}
.buff-tag{font-size:.58rem;font-weight:800;padding:1px 5px;border-radius:4px;line-height:1.5;letter-spacing:.3px}
.buff-tag.team{background:rgba(255,200,50,.18);color:#ffcc44;border:1px solid rgba(255,200,50,.3)}
.buff-tag.cond{background:rgba(180,160,80,.15);color:#ccaa44;border:1px solid rgba(180,160,80,.25)}
.buff-pts{font-size:.78rem;font-weight:700;flex-shrink:0;min-width:38px;text-align:right}
.buff-pts.is-cond{font-size:.72rem}
.buff-pts .base-pts{font-size:.6rem;opacity:.5;font-weight:400}
/* Shared buffs */
.shared-row{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;margin-bottom:10px}
.shared-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:7px}
.shared-list{display:flex;flex-wrap:wrap;gap:5px}
.shared-chip{font-size:.73rem;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid;display:inline-flex;align-items:center;gap:5px;opacity:.6}

/* Bottom bar */
.bottom{height:44px;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;padding:0 16px;gap:10px}
.bottom-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);flex-shrink:0}
.bottom-hint{font-size:.78rem;color:var(--text2);flex:1;text-align:center}
.bottom-name{font-size:.75rem;font-weight:700;flex-shrink:0}
.bottom-name.l{color:var(--left)}
.bottom-name.r{color:var(--right)}
.bottom-bars{flex:1;display:flex;gap:2px;align-items:center;min-width:0}
.bar-l{height:9px;border-radius:2px 0 0 2px;background:var(--left);opacity:.8;transition:width .5s}
.bar-r{height:9px;border-radius:0 2px 2px 0;background:var(--right);opacity:.8;transition:width .5s}

@media(max-width:640px){
  body{height:auto;overflow-y:auto}
  .toggle-btn{display:flex}
  .hhint,.hsep{display:none}
  .layout{flex-direction:column;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border2);max-height:0;overflow:hidden;transition:max-height .32s ease;flex-shrink:0}
  .sidebar.open{max-height:300px}
  .monster-grid{grid-template-columns:repeat(4,1fr)}
  .compare{overflow:visible}
  .cmp-scroll{overflow:visible}
  .heads{grid-template-columns:1fr 1fr}
  .hcard{padding:10px 12px;gap:8px}
  .hport{width:44px;height:44px}
  .bottom{height:auto;flex-wrap:wrap;padding:8px 12px;gap:6px}
  .bottom-bars{min-width:100%;order:3}
  .bottom-name.l{order:1;flex:1}
  .bottom-name.r{order:2;flex:1;text-align:right}
}
</style>
</head>
<body>

<script>
const IMAGES_PATH="./images/";

// ═══════════════════════════════════════════════════════════════
// BARÈME DE PUISSANCE — principes :
//   • range_3 : 28  → le buff le plus impactant pour une unité range (portée = fenêtre d'attaque)
//   • dmg_20  : 18  → permanent, s'applique à toutes les attaques, sous-évalué à 12
//   • stealth_shield : 38 → seulement 3s, durée très courte, ramené de 50
//   • buffs TEAM ont des power intrinsèquement élevés (profite à 4 unités)
//   • buffs COND reçoivent ×0.6 au calcul (fréquence/condition réelle)
// ═══════════════════════════════════════════════════════════════
const BUFFS={
  // ── Offensif ATQ & Dégâts ─────────────────────────────────
  "atk_10"              :{label:"ATQ +10%",                             color:"#e05555",power:12},
  "atk_25_delay"        :{label:"ATQ +25% (après 10s)",                color:"#ff4444",power:20,cond:true},
  "atk_100"             :{label:"ATQ +100% (×10 stacks Yang)",         color:"#ff0000",power:45,cond:true},
  "dmg_20"              :{label:"Dégâts +20%",                         color:"#d06030",power:18},  // permanent → 18
  "dmg_150"             :{label:"Dégâts +150% (sous Furtivité)",       color:"#ff6600",power:55,cond:true},
  "dmg_aoe_scaling"     :{label:"Dégâts ×ennemis touchés (max ×10)",  color:"#ddaa66",power:35},
  "dmg_buff_scaling"    :{label:"Dégâts / Nb Buffs (max 30)",         color:"#c8a830",power:26},
  "dmg_debuff_scaling"  :{label:"Dégâts / Nb Debuffs (max 15)",       color:"#d07030",power:52},
  "dmg_unique_target"   :{label:"Dégâts Cible Unique ↑",              color:"#cc5030",power:16},
  // ── Crits & Coups ─────────────────────────────────────────
  "crit_rate_10"        :{label:"Taux Crit +10%",                      color:"#c8a830",power:14},
  "crit_dmg_10_cond"    :{label:"Dég. Crit +10% (×effet ennemi)",      color:"#c8b840",power:12,cond:true},
  "crit_dmg_20"         :{label:"Dég. Crit +20%",                      color:"#c8b840",power:20},
  "crush_rate_10"       :{label:"Coup Puissant +10%",                  color:"#e0a020",power:14},
  "crush_rate_10_cond"  :{label:"Coup Puissant +10% (sous Furtivité)", color:"#e0a020",power:14,cond:true},
  "crush_rate_10_team"  :{label:"Coup Puissant ALLIÉS +10%",           color:"#f0b030",power:28,team:true},
  "crush_dmg_20"        :{label:"Dég. Coup Puissant +20%",             color:"#e0a020",power:20},
  "double_hit_10"       :{label:"Coup Double +10%",                    color:"#cc70bb",power:18},
  "double_hit_15"       :{label:"Coup Double +15%",                    color:"#cc70bb",power:22},
  "triple_hit_10"       :{label:"Coup Triple +10%",                    color:"#aa60ee",power:28},
  "no_crit_cd"          :{label:"Reset CD Attaque Crit (4s)",          color:"#e0a020",power:32,cond:true},
  "cc_eff_20"           :{label:"Efficacité CC +20%",                  color:"#dd8844",power:14,cond:true},
  "dmg_petrified_20"    :{label:"Dégâts sur Pétrifiés +20%",           color:"#bb6622",power:12,cond:true},
  // ── Vitesse & Portée ──────────────────────────────────────
  "spd_10"              :{label:"Vit. ATQ +10%",                       color:"#e07832",power:12},
  "spd_15"              :{label:"Vit. ATQ +15%",                       color:"#e07832",power:16},
  "spd_30"              :{label:"Vit. ATQ +30%",                       color:"#e07832",power:26},
  "spd_40_cond"         :{label:"Vit. ATQ +40% (1s)",                  color:"#ff8800",power:22,cond:true},
  "spd_team_20"         :{label:"Vit. ATQ ALLIÉS +20%",                color:"#ffcc33",power:42,team:true},
  "skill_accel_15"      :{label:"Accél. Compétences +15%",             color:"#30b0d0",power:18},
  "skill_accel_20_cond" :{label:"Accél. Compétences +20% (2s, proc)", color:"#30b0d0",power:22,cond:true},
  "range_3"             :{label:"Portée +3",                           color:"#50b890",power:28},  // clé range → 28
  "aoe_range_30"        :{label:"Rayon Zone +30%",                     color:"#66ddaa",power:22},
  "move_spd_200"        :{label:"Vit. Déplacement +200% (3s)",         color:"#4488cc",power:10},
  // ── Survie & Protection ───────────────────────────────────
  "def_15"              :{label:"DEF +15%",                            color:"#4d8fd6",power:10},
  "res_lp_30"           :{label:"Résist. Longue Portée -30%",          color:"#4488aa",power:16},
  "dmg_resist_10"       :{label:"Résist. Dégâts +10%",                 color:"#5588cc",power:18},
  "dmg_resist_20_team"  :{label:"Résist. Dégâts ALLIÉS +20%",          color:"#33ccff",power:36,team:true},
  "dmg_resist_80_cond"  :{label:"Résist. Dégâts +80% (2s)",            color:"#0044ff",power:32,cond:true},
  "shield_hits_3_team"  :{label:"Bouclier ×3 ALLIÉS",                  color:"#6688ff",power:32,team:true},
  "shield_hits_5"       :{label:"Bouclier ×5",                         color:"#4466cc",power:22},
  "stealth_shield"      :{label:"Bouclier Invincible 3s",              color:"#aa66dd",power:38},  // 3s seulement → 38
  "endurance_cond"      :{label:"Endurance anti-mort (sur coup létal)",color:"#ff44aa",power:42,cond:true},
  "dodge_3s"            :{label:"Esquive Absolue 3s",                  color:"#60aaee",power:22},
  // ── Utilitaire & Mécaniques ───────────────────────────────
  "cc_immune_team_30"   :{label:"Immunité CC ALLIÉS (30s)",            color:"#44ddaa",power:52,team:true},
  "cd_reset_proc"       :{label:"Reset CD Compétence (conditionnel)",  color:"#00ffff",power:22,cond:true},
  "cd_skill_cond"       :{label:"Réduction CD Compétence Excl.",       color:"#30c0d0",power:14,cond:true},
  "fox_fire_cond"       :{label:"Feu du renard (sur Coup Puissant)",   color:"#ff8c42",power:12,cond:true},
  "fox_fire_burst"      :{label:"Feu du renard Burst ×2 (×20 stacks)",color:"#ff6820",power:24,cond:true},
  "stealth"             :{label:"Furtivité",                           color:"#8855cc",power:18},
  "strip_shield"        :{label:"Suppression Bouclier ennemi",         color:"#ee4444",power:20},
  "rockstar_i"          :{label:"Rockstar I (passif permanente)",      color:"#ff44cc",power:22},
  "rockstar_iii_cond"   :{label:"Rockstar III 2s (conditionnel)",      color:"#ff00aa",power:14,cond:true},
  "happy_box_cond"      :{label:"Happy Box (sur Coup Puissant)",       color:"#ffaa22",power:14,cond:true},
  "merry_box_team_cond" :{label:"Merry Box ALLIÉS (×5 stacks, 4s)",   color:"#ffcc33",power:36,team:true,cond:true},
  // ── Debuffs & Synergies ───────────────────────────────────
  "bleed"               :{label:"Saignement (ennemi)",                 color:"#b02020",power:12},
  "weak_point_detect"   :{label:"Détection P.Faible ALLIÉS (sur dot)", color:"#ffaa44",power:14,team:true,cond:true},
  "weakness_element"    :{label:"Faiblesse Élémentaire (ennemi)",      color:"#50aaee",power:18},
  "weakness_elem_team"  :{label:"Faiblesse Élémentaire ALLIÉS",        color:"#70ccff",power:30,team:true},
  "debuff_aoe_taken_10" :{label:"Dégâts Zone reçus +10% (ennemi)",     color:"#dd6644",power:12,cond:true},
  "debuff_crit_taken_10":{label:"Dég. Crit reçus +10% (ennemi)",       color:"#dd6644",power:14},
};

const AWK3={level:3,desc:"Réduit de 100% le temps de recharge de ses compétences au début du combat.",buffs:[],pvp:true,pve:true};

const MONSTERS={
  "Craka":{type:"melee",awakenings:[AWK3,
    {level:5,desc:"Début de combat :\n- ATQ +10% (cumulable).\n- Résist. dégâts longue portée -30%.\n- Chaque Saignement → allié : Détection point faible 10% / 10s.",buffs:["atk_10","res_lp_30","bleed","weak_point_detect"],pvp:true,pve:false},
    {level:7,desc:"Attaque réussie :\n- Point faible – Saignement 15% sur l'ennemi (cumulable).\n- Dégâts +20%.",buffs:["weakness_element","dmg_20"],pvp:true,pve:false}]},
  "Mago":{type:"melee",awakenings:[AWK3,
    {level:5,desc:"Début de combat :\n- Esquive absolue 3s.\n- ATQ +10%.\n- Furtivité.\n- Sous Furtivité : Coup puissant +10% / 3s.",buffs:["dodge_3s","atk_10","stealth","crush_rate_10_cond"],pvp:true,pve:false},
    {level:7,desc:"Sous Furtivité :\n- Dégâts +150% / 3s (cumulable).\n- Attaque réussie : Dég. Coups puissants +20% / 10s.\n- Dégâts +20%.",buffs:["dmg_150","crush_dmg_20","dmg_20"],pvp:true,pve:false}]},
  "Jagger":{type:"melee",awakenings:[AWK3,

<header>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><path d="M12 2L8 8H2l5 4-2 7 7-4 7 4-2-7 5-4h-6z"/></svg>
  <span class="logo-text">SW RUSH · COMPARATEUR</span>
  <div class="hsep"></div>
  <span class="hhint">Sélectionnez deux monstres pour comparer</span>
  <button class="toggle-btn" id="toggleSidebar" onclick="toggleSidebar()">
    <svg class="arr" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    <span id="toggleLbl">Sélectionner</span>
  </button>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <div class="search-inner">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Rechercher…" oninput="buildGrid()">
      </div>
    </div>
    <div class="type-filter" id="typeFilter">
      <button class="tf all active-all" data-type="">Tous</button>
      <button class="tf" data-type="melee">Mêlée</button>
      <button class="tf" data-type="tank">Tank</button>
      <button class="tf" data-type="range">Range</button>
      <button class="tf" data-type="support">Support</button>
    </div>
    <div class="monster-grid" id="monsterGrid"></div>
  </div>

  <div class="compare" id="compare">
    <div class="empty-state">
      <div class="empty-ring"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      Sélectionnez un monstre dans la grille
    </div>
    <div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez deux monstres pour comparer</span></div>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────
function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`}
const COND_MULT=0.6;
function buffVal(id){const b=BUFFS[id];if(!b)return 0;return b.power*(b.cond?COND_MULT:1)}
function awkRaw(a){return(a.buffs||[]).reduce((s,id)=>s+buffVal(id),0)}
const MAX_AWK=Math.max(...Object.values(MONSTERS).flatMap(m=>(m.awakenings||[]).filter(a=>a.level!==3).map(awkRaw)));
function awkPts(a){return Math.round(awkRaw(a)/MAX_AWK*100)}
function totalPts(m){return(m.awakenings||[]).filter(a=>a.level!==3).reduce((s,a)=>s+awkPts(a),0)}
const MAX_TOTAL=200;
function scoreCol(r){return r>=.7?'#52b86a':r>=.4?'#d4a44a':'#c44040'}
function scoreGrad(r){return r>=.7?'linear-gradient(90deg,#1e5528,#52b86a)':r>=.4?'linear-gradient(90deg,#6a4010,#d4a44a)':'linear-gradient(90deg,#601818,#c44040)'}
function hDesc(t){return t.replace(/(\+\d+(?:[,.]\d+)?%)/g,'<span class="vp">$1</span>').replace(/(-\d+(?:[,.]\d+)?%)/g,'<span class="vm">$1</span>')}

const ROLE={melee:{label:'Mêlée',cls:'pill-melee'},tank:{label:'Tank',cls:'pill-tank'},range:{label:'Range',cls:'pill-range'},support:{label:'Support',cls:'pill-support'}};
const TCOL={melee:'var(--melee)',tank:'var(--tank)',range:'var(--range)',support:'var(--support)'};

// ── Mobile ───────────────────────────────────────────────────
function toggleSidebar(){
  const s=document.getElementById('sidebar'),b=document.getElementById('toggleSidebar');
  s.classList.toggle('open');b.classList.toggle('open');
}
function updateToggleLbl(){
  const n=(sel.left?1:0)+(sel.right?1:0);
  const el=document.getElementById('toggleLbl');
  if(el)el.textContent=n>0?`${n}/2 sélectionnés`:'Sélectionner';
}

// ── State ────────────────────────────────────────────────────
let sel={left:null,right:null},nextSlot='left',activeType='';

// ── Buff row HTML ────────────────────────────────────────────
function buffRow(id, accentColor){
  const b=BUFFS[id]; if(!b) return '';
  const eff=Math.round(buffVal(id));
  const base=b.power;
  const isCond=!!b.cond;
  const bg=`rgba(${rgb(b.color)},.08)`;
  const border=b.color;
  const teamTag=b.team?`<span class="buff-tag team">TEAM</span>`:'';
  const condTag=isCond?`<span class="buff-tag cond">COND</span>`:'';
  const ptsHtml=isCond
    ? `<span class="buff-pts is-cond" style="color:${b.color}">${eff}<span class="base-pts"> /${base}</span></span>`
    : `<span class="buff-pts" style="color:${b.color}">${eff}</span>`;
  return`<div class="buff-row${isCond?' is-cond':''}" style="background:${bg};border-color:${border};border-opacity:.3">
    <div class="buff-icon" style="background:${b.color}"></div>
    <span class="buff-label">${b.label}</span>
    <div class="buff-tags">${teamTag}${condTag}</div>
    ${ptsHtml}
  </div>`;
}

// ── Awakening card ───────────────────────────────────────────
function awkCard(a, side){
  const pts=awkPts(a);
  const c=scoreCol(pts/100);
  const accentColor=side==='l'?'var(--left)':side==='r'?'var(--right)':c;
  const modeHtml=(a.pvp?`<span style="font-size:.62rem;font-weight:700;color:#c04040;background:rgba(192,64,64,.12);border:1px solid rgba(192,64,64,.25);border-radius:4px;padding:2px 6px">PvP</span>`:'')
    +(a.pve?`<span style="font-size:.62rem;font-weight:700;color:#2e9898;background:rgba(46,152,152,.12);border:1px solid rgba(46,152,152,.25);border-radius:4px;padding:2px 6px">PvE</span>`:'');
  const buffsHtml=(a.buffs||[]).map(id=>buffRow(id,accentColor)).join('');
  return`<div class="awk-card lv${a.level}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      ${modeHtml}
      <span style="margin-left:auto;font-size:.85rem;font-weight:700;color:${c}">${pts} pts</span>
    </div>
    <div class="awk-desc">${hDesc(a.desc)}</div>
    <div class="buff-list">${buffsHtml}</div>
  </div>`;
}

// ── Monster header card ──────────────────────────────────────
function headCard(name, side, isWinner){
  const m=MONSTERS[name],tot=totalPts(m),r=tot/MAX_TOTAL,c=scoreCol(r),g=scoreGrad(r);
  const role=ROLE[m.type]||{label:m.type,cls:''};
  return`<div class="hcard side-${side}${isWinner?' winner':''}">
    ${isWinner?`<div class="winner-badge">★ Meilleur score</div>`:''}
    <img class="hport" src="${IMAGES_PATH}${name}.png" onerror="this.outerHTML='<div class=hport-ph>${name}</div>'">
    <div style="flex:1;min-width:0">
      <div class="hname">${name}</div>
      <span class="htype-pill ${role.cls}">${role.label}</span>
      <div class="hscore" style="color:${c}">${tot}<span class="hscore-den">/ ${MAX_TOTAL}</span></div>
      <div class="hbar-wrap"><div class="hbar-fill" style="width:${Math.min(r*100,100)}%;background:${g}"></div></div>
    </div>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────
function renderContent(){
  const cmp=document.getElementById('compare');
  if(!sel.left&&!sel.right){
    cmp.innerHTML=`<div class="empty-state"><div class="empty-ring"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>Sélectionnez un monstre dans la grille</div><div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez deux monstres pour comparer</span></div>`;
    return;
  }
  if(!sel.left||!sel.right){
    const name=sel.left||sel.right,m=MONSTERS[name],tot=totalPts(m),r=tot/MAX_TOTAL,c=scoreCol(r),g=scoreGrad(r);
    const role=ROLE[m.type]||{label:m.type,cls:''};
    const awks=(m.awakenings||[]).filter(a=>a.level!==3).map(a=>{
      const pts=awkPts(a),lv=a.level;
      return`<div class="awk-section">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span class="awk-lv-label lv${lv}" style="padding:5px 12px;border-radius:6px">Éveil ${lv}<span class="awk-lv-pts" style="margin-left:10px">${pts} pts</span></span>
        </div>
        ${awkCard(a,'l')}
      </div>`}).join('');
    cmp.innerHTML=`<div class="cmp-scroll">
      <div class="heads" style="grid-template-columns:minmax(0,480px)">
        ${headCard(name,'l',false)}
      </div>
      ${awks}
    </div>
    <div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez un 2ᵉ monstre</span></div>`;
    return;
  }

  // Duo
  const nL=sel.left,nR=sel.right,mL=MONSTERS[nL],mR=MONSTERS[nR];
  const totL=totalPts(mL),totR=totalPts(mR);
  const rL=totL/MAX_TOTAL,rR=totR/MAX_TOTAL;
  const winL=totL>totR,winR=totR>totL,diff=Math.abs(totL-totR);
  const wName=winL?nL:winR?nR:null;
  const wColor=winL?'var(--left)':winR?'var(--right)':'var(--gold)';

  let vtxt='';
  if(!wName) vtxt='Scores identiques — équivalents.';
  else if(diff<15) vtxt=`<strong style="color:${wColor}">${wName}</strong> légèrement supérieur <strong>(+${diff} pts)</strong>.`;
  else if(diff<35) vtxt=`<strong style="color:${wColor}">${wName}</strong> prend l'avantage : <strong>+${diff} pts</strong>.`;
  else vtxt=`<strong style="color:${wColor}">${wName}</strong> domine clairement : <strong>+${diff} pts</strong>.`;

  const awL=(mL.awakenings||[]).filter(a=>a.level!==3);
  const awR=(mR.awakenings||[]).filter(a=>a.level!==3);
  const maxA=Math.max(awL.length,awR.length);

  let awkHtml='';
  for(let i=0;i<maxA;i++){
    const aL=awL[i],aR=awR[i],lv=aL?aL.level:aR.level;
    const ptsL=aL?awkPts(aL):null,ptsR=aR?awkPts(aR):null;
    const winsL=ptsL!==null&&ptsR!==null&&ptsL>ptsR,winsR=ptsL!==null&&ptsR!==null&&ptsR>ptsL;
    awkHtml+=`<div class="awk-section">
      <div class="awk-level-header">
        <div class="awk-lv-label lv${lv}">
          <span>Éveil ${lv}</span>
          ${ptsL!==null?`<span class="awk-lv-pts" style="color:${winsL?'var(--left)':'inherit'}">${ptsL} pts${winsL?' ▲':''}</span>`:'<span>—</span>'}
        </div>
        <div class="awk-lv-label lv${lv}">
          <span>Éveil ${lv}</span>
          ${ptsR!==null?`<span class="awk-lv-pts" style="color:${winsR?'var(--right)':'inherit'}">${ptsR} pts${winsR?' ▲':''}</span>`:'<span>—</span>'}
        </div>
      </div>
      <div class="awk-row">
        <div>${aL?awkCard(aL,'l'):`<div class="awk-card lv${lv}" style="opacity:.2;display:flex;align-items:center;justify-content:center;min-height:60px;color:var(--text2)">—</div>`}</div>
        <div>${aR?awkCard(aR,'r'):`<div class="awk-card lv${lv}" style="opacity:.2;display:flex;align-items:center;justify-content:center;min-height:60px;color:var(--text2)">—</div>`}</div>
      </div>
    </div>`;
  }

  // Shared buffs
  const bL=new Set((mL.awakenings||[]).filter(a=>a.level!==3).flatMap(a=>a.buffs||[]));
  const bR=new Set((mR.awakenings||[]).filter(a=>a.level!==3).flatMap(a=>a.buffs||[]));
  const shared=[...bL].filter(b=>bR.has(b));
  const sharedHtml=shared.length?`<div class="shared-row">
    <div class="shared-title">Buffs communs aux deux monstres</div>
    <div class="shared-list">${shared.map(id=>{const b=BUFFS[id];if(!b)return'';return`<span class="shared-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.06)">${b.label}</span>`}).join('')}</div>
  </div>`:'';

  cmp.innerHTML=`<div class="cmp-scroll">
    <div class="heads">
      ${headCard(nL,'l',winL)}
      ${headCard(nR,'r',winR)}
    </div>
    <div class="verdict">⚖️ ${vtxt}</div>
    ${sharedHtml}
    ${awkHtml}
  </div>
  <div class="bottom" id="bottom"></div>`;

  const lp=totL,rp=totR,mx=Math.max(lp,rp)||1,lw=Math.round(lp/mx*46),rw=Math.round(rp/mx*46);
  document.getElementById('bottom').innerHTML=`<span class="bottom-label">Score</span>
    <span class="bottom-name l">${nL} <span style="font-size:.62rem;opacity:.55;font-weight:400">${lp}</span></span>
    <div class="bottom-bars"><div class="bar-l" style="width:${lw}%"></div><div class="bar-r" style="width:${rw}%"></div></div>
    <span class="bottom-name r">${nR} <span style="font-size:.62rem;opacity:.55;font-weight:400">${rp}</span></span>`;
}

// ── Grid ─────────────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('monsterGrid'),q=document.getElementById('searchInput').value.toLowerCase();
  g.innerHTML='';
  const names=Object.keys(MONSTERS).filter(n=>(!activeType||MONSTERS[n].type===activeType)&&n.toLowerCase().includes(q));
  if(!names.length){g.innerHTML=`<div style="grid-column:1/-1;color:var(--text2);font-size:.75rem;padding:14px;text-align:center">Aucun résultat</div>`;return;}
  names.forEach(name=>{
    const m=MONSTERS[name],el=document.createElement('div');
    el.className='m-tile';
    if(sel.left===name)el.classList.add('sel-l');
    if(sel.right===name)el.classList.add('sel-r');
    const numColor=sel.left===name?'var(--left)':sel.right===name?'var(--right)':'';
    const numBg=sel.left===name?'rgba(77,127,255,.25)':sel.right===name?'rgba(255,94,46,.25)':'';
    const numTxt=sel.left===name?'①':sel.right===name?'②':'';
    el.innerHTML=`<div style="position:relative">
      <img class="m-img" src="${IMAGES_PATH}${name}.png" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="m-img-ph" style="display:none">${name}</div>
      ${numTxt?`<div class="sel-num" style="background:${numBg};color:${numColor}">${numTxt}</div>`:''}
    </div>
    <div class="m-name">${name}</div>
    <div class="m-dot" style="background:${TCOL[m.type]||'var(--text2)'}"></div>`;
    el.onclick=()=>pick(name);
    g.appendChild(el);
  });
}

function pick(name){
  if(sel.left===name){sel.left=null;nextSlot='left';}
  else if(sel.right===name){sel.right=null;nextSlot='right';}
  else{sel[nextSlot]=name;nextSlot=nextSlot==='left'?'right':'left';}
  updateToggleLbl();buildGrid();renderContent();
}

document.getElementById('typeFilter').addEventListener('click',e=>{
  const btn=e.target.closest('.tf');if(!btn)return;
  document.querySelectorAll('.tf').forEach(b=>{b.className='tf'+(b.classList.contains('all')?' all':'')});
  activeType=btn.dataset.type;
  btn.classList.add(activeType?`active-${activeType}`:'active-all');
  buildGrid();
});

buildGrid();
</script>
</body>
</html>

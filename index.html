<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Rush – Comparateur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#111827;--surface:#1a2537;--surface2:#1f2d42;--surface3:#243350;
  --border:#2a3a54;--border2:#334460;
  --gold:#d4a44a;--gold-lt:#ecc46a;--gold-glow:rgba(212,164,74,.18);
  --text:#d8e4f8;--text2:#7a90b8;--text3:#a0b4d0;
  --left:#4d7fff;--right:#ff5e2e;
  --melee:#e05555;--tank:#4d8fd6;--range:#d49828;--support:#52b86a;
  --pvp:#c04040;--pve:#2e9898;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
header{height:46px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 14px;gap:10px}
.logo{display:flex;align-items:center;gap:8px}
.logo svg{color:var(--gold)}
.logo-text{font-family:'Cinzel',serif;font-size:.92rem;color:var(--gold-lt);letter-spacing:2px}
.hsep{width:1px;height:22px;background:var(--border2)}
.hhint{font-size:.75rem;color:var(--text2)}
.toggle-btn{display:none;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--text3);font-family:'Inter',sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;margin-left:auto;transition:all .15s}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold-lt)}
.toggle-btn .arr{transition:transform .25s}
.toggle-btn.open .arr{transform:rotate(180deg)}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── Sidebar ── */
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.search-box{padding:8px;border-bottom:1px solid var(--border)}
.search-inner{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;transition:border-color .2s}
.search-inner:focus-within{border-color:var(--gold)}
.search-inner svg{flex-shrink:0;color:var(--text2)}
.search-inner input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.8rem;width:100%}
.search-inner input::placeholder{color:var(--text2)}
.type-filter{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:6px 8px;border-bottom:1px solid var(--border)}
.tf{font-size:.65rem;font-weight:700;padding:5px 3px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.tf:hover{color:var(--text);background:var(--surface2)}
.tf.all{grid-column:1/-1}
.tf.active-all{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-glow)}
.tf.active-melee{border-color:var(--melee);color:var(--melee);background:rgba(224,85,85,.1)}
.tf.active-tank{border-color:var(--tank);color:var(--tank);background:rgba(77,143,214,.1)}
.tf.active-range{border-color:var(--range);color:var(--range);background:rgba(212,152,40,.1)}
.tf.active-support{border-color:var(--support);color:var(--support);background:rgba(82,184,106,.1)}
.monster-grid{flex:1;overflow-y:auto;padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:5px;align-content:start}
.monster-grid::-webkit-scrollbar{width:3px}
.monster-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.m-tile{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .15s;text-align:center}
.m-tile:hover{background:var(--surface2);border-color:var(--border2)}
.m-tile.sel-l{background:rgba(77,127,255,.12);border-color:rgba(77,127,255,.6);box-shadow:0 0 10px rgba(77,127,255,.15)}
.m-tile.sel-r{background:rgba(255,94,46,.12);border-color:rgba(255,94,46,.6);box-shadow:0 0 10px rgba(255,94,46,.15)}
.m-img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border2)}
.m-img-ph{width:48px;height:48px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.42rem;color:var(--text2);border:1px solid var(--border);line-height:1.3;padding:3px;text-align:center}
.m-name{font-size:.68rem;font-weight:600;color:var(--text3);line-height:1.2;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sel-badge{font-size:.55rem;font-weight:700;padding:1px 5px;border-radius:4px;line-height:1.4}

/* ── Pills ── */
.pill{font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid;white-space:nowrap}
.pill-melee{color:var(--melee);border-color:rgba(224,85,85,.4);background:rgba(224,85,85,.1)}
.pill-tank{color:var(--tank);border-color:rgba(77,143,214,.4);background:rgba(77,143,214,.1)}
.pill-range{color:var(--range);border-color:rgba(212,152,40,.4);background:rgba(212,152,40,.1)}
.pill-support{color:var(--support);border-color:rgba(82,184,106,.4);background:rgba(82,184,106,.1)}

/* ── Compare area ── */
.compare{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text2);font-size:.9rem}
.empty-ring{width:64px;height:64px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;opacity:.4}

/* ── Monster header strip ── */
.heads{display:flex;flex-shrink:0;padding:14px 16px 0;gap:12px}
.hcard{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.hcard.side-l::before{background:linear-gradient(90deg,transparent,var(--left),transparent)}
.hcard.side-r::before{background:linear-gradient(90deg,transparent,var(--right),transparent)}
.hcard.winner{border-color:rgba(82,184,106,.45);box-shadow:0 0 18px rgba(82,184,106,.1)}
.hport{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border2)}
.hport-ph{width:52px;height:52px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.58rem;color:var(--text2);border:1px solid var(--border);flex-shrink:0;text-align:center}
.hname{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-lt);letter-spacing:1px;margin-bottom:4px}
.hscore-num{font-size:1.6rem;font-weight:700;line-height:1}
.hscore-den{font-size:.7rem;color:var(--text2);margin-left:3px}
.hbar{height:4px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px;width:100%}
.hbar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.winner-badge{position:absolute;top:8px;right:10px;font-size:.62rem;font-weight:700;color:#52b86a;background:rgba(82,184,106,.15);border:1px solid rgba(82,184,106,.3);border-radius:20px;padding:1px 8px}

/* ── Bilan v2 ── */
.bilan{margin:10px 16px 8px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;flex-shrink:0}
.bilan-verdict{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.015)}
.bilan-verdict-txt{font-size:.82rem;line-height:1.4;color:var(--text)}
.bilan-sec{border-top:1px solid var(--border)}
.bilan-sec-hd{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);padding:6px 14px 0}
.bilan-3col{display:grid;grid-template-columns:1fr 68px 1fr;padding:5px 14px 8px;gap:4px 6px;align-items:center}
.bc-l{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.bc-c{display:flex;align-items:center;justify-content:center}
.bc-r{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.mode-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.mode-lbl-pvp{color:var(--pvp);border-color:rgba(192,64,64,.3);background:rgba(192,64,64,.08)}
.mode-lbl-pve{color:var(--pve);border-color:rgba(46,152,152,.3);background:rgba(46,152,152,.08)}
.mode-score-row{display:flex;align-items:center;gap:5px;width:100%}
.mode-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mode-bar-fill{height:100%;border-radius:2px}
.mode-pts{font-size:.78rem;font-weight:700;white-space:nowrap}
.mode-na{font-size:.72rem;color:var(--text2)}
.bilan-shared{padding:5px 14px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.shared-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-right:4px;white-space:nowrap}

/* ── Buff chip ── */
.buff-chip{font-size:.6rem;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid;cursor:default;display:inline-flex;align-items:center;gap:4px}
.team-badge{font-size:.48rem;font-weight:900;background:rgba(255,255,255,.18);border-radius:3px;padding:1px 3px;letter-spacing:.4px}

/* ── Awakenings ── */
.awk-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;padding:0 16px 14px}
.awk-sec-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);display:flex;align-items:center;gap:8px;padding:8px 0}
.awk-sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.awk-pairs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:0}
.awk-pairs::-webkit-scrollbar{width:3px}
.awk-pairs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.awk-pair-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch}
.awk{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.awk::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.awk.lv5::before{background:var(--gold)}
.awk.lv7::before{background:#cc3355}
.awk-head{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.awk-lv{font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;color:var(--gold);border:1px solid rgba(212,164,74,.35);background:var(--gold-glow);border-radius:5px;padding:2px 8px}
.awk-score{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:5px;border:1px solid}
.awk-modes{display:flex;gap:3px;margin-left:auto}
.mode-pvp{font-size:.6rem;padding:2px 6px;border-radius:5px;font-weight:700;color:var(--pvp);background:rgba(192,64,64,.12);border:1px solid rgba(192,64,64,.3)}
.mode-pve{font-size:.6rem;padding:2px 6px;border-radius:5px;font-weight:700;color:var(--pve);background:rgba(46,152,152,.12);border:1px solid rgba(46,152,152,.3)}
.awk-desc{white-space:pre-line;font-size:.79rem;line-height:1.7;color:var(--text3);margin-bottom:8px}
.awk-desc .vp{color:var(--text);font-weight:700}
.awk-desc .vm{color:#ff8855;font-weight:700}
.buff-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.awk-bar{display:flex;align-items:center;gap:8px}
.awk-bar-track{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden}
.awk-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.awk-bar-val{font-size:.62rem;font-weight:700;width:50px;text-align:right}

/* ── Bottom bar ── */
.bottom{height:42px;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;padding:0 16px;gap:10px}
.bottom-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);flex-shrink:0}
.bottom-hint{font-size:.78rem;color:var(--text2);flex:1;text-align:center}
.bottom-name{font-size:.75rem;font-weight:700;min-width:80px;flex-shrink:0}
.bottom-name.l{color:var(--left);text-align:right}
.bottom-name.r{color:var(--right)}
.bottom-bars{flex:1;display:flex;gap:2px;align-items:center}
.bar-l{height:10px;border-radius:2px 0 0 2px;background:var(--left);opacity:.85;transition:width .5s}
.bar-r{height:10px;border-radius:0 2px 2px 0;background:var(--right);opacity:.85;transition:width .5s}

/* ── Mobile ── */
@media(max-width:640px){
  body{height:auto;overflow-y:auto}
  .toggle-btn{display:flex}
  .hhint{display:none}
  .hsep{display:none}
  .layout{flex-direction:column;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border2);max-height:0;overflow:hidden;transition:max-height .32s ease;flex-shrink:0}
  .sidebar.open{max-height:310px}
  .monster-grid{grid-template-columns:repeat(4,1fr)}
  .compare{overflow:visible;min-height:0}
  .awk-area{overflow:visible;padding:0 10px 10px}
  .awk-pairs{overflow:visible}
  .heads{flex-direction:column;padding:10px 10px 0;gap:8px}
  .hcard{max-width:100%!important}
  .bilan{margin:8px 10px 6px}
  .awk-pair-row{gap:6px}
  .awk{padding:8px 10px}
  .awk-desc{font-size:.72rem;line-height:1.5}
  .bottom{height:auto;flex-wrap:wrap;padding:8px 12px;gap:5px}
  .bottom-bars{min-width:100%;order:3}
  .bottom-name.l{order:1;min-width:0;flex:1}
  .bottom-name.r{order:2;min-width:0;flex:1;text-align:right}
  .bilan-3col{padding:4px 10px 8px;gap:3px 4px}
  .bilan-sec-hd{padding:6px 10px 0}
  .bilan-shared{padding:4px 10px 8px}
  .bilan-verdict{padding:8px 10px}
}
</style>
</head>

  </div>
  <div class="hsep"></div>

  <button class="toggle-btn" id="toggleSidebar" onclick="toggleSidebar()">
    <svg class="arr" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>

<div class="layout">
  <div class="sidebar" id="sidebar">

      <div class="search-inner">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Rechercher…" oninput="buildGrid()">
      </div>
    </div>
    <div class="type-filter" id="typeFilter">
      <button class="tf all active-all" data-type="">Tous</button>
      <button class="tf" data-type="melee">Mêlée</button>
      <button class="tf" data-type="tank">Tank</button>
      <button class="tf" data-type="range">Range</button>
      <button class="tf" data-type="support">Support</button>
    </div>
    <div class="monster-grid" id="monsterGrid"></div>
  </div>

  <div class="compare" id="compare">
    <div class="empty-state">
      <div class="empty-ring"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      Sélectionnez un monstre dans la grille
    </div>
    <div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez deux monstres pour comparer</span></div>
  </div>
</div>

<script>
// ── Score helpers ───────────────────────────────────────────
function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`}

// Exclude AWK3 everywhere
function awkRaw(a){return(a.buffs||[]).reduce((s,id)=>s+(BUFFS[id]?BUFFS[id].power:0),0)}
const MAX_AWK=Math.max(...Object.values(MONSTERS).flatMap(m=>(m.awakenings||[]).filter(a=>a.level!==3).map(awkRaw)));
function awkPts(a){return Math.round(awkRaw(a)/MAX_AWK*100)}
function totalPts(m){return(m.awakenings||[]).filter(a=>a.level!==3).reduce((s,a)=>s+awkPts(a),0)}
const MAX_TOTAL=200;

function modeScore(m,mode){return(m.awakenings||[]).filter(a=>a.level!==3&&a[mode]).reduce((s,a)=>s+awkPts(a),0)}

function scoreCol(r){return r>=.7?'#52b86a':r>=.4?'#d4a44a':'#c44040'}
function scoreGrad(r){return r>=.7?'linear-gradient(90deg,#287030,#52b86a)':r>=.4?'linear-gradient(90deg,#7a5010,#d4a44a)':'linear-gradient(90deg,#702020,#c44040)'}
function hDesc(t){return t.replace(/(\+\d+(?:,\d+)?%)/g,'<span class="vp">$1</span>').replace(/(-\d+(?:,\d+)?%)/g,'<span class="vm">$1</span>')}

function chips(ids){
  return(ids||[]).map(id=>{
    const b=BUFFS[id];if(!b)return'';
    const team=b.team?'<span class="team-badge">TEAM</span>':'';
    return`<span class="buff-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.12)">${b.label}${team}</span>`
  }).join('')
}

function allBuffsOf(name){
  const s=new Set(),o=[];
  (MONSTERS[name].awakenings||[]).filter(a=>a.level!==3).forEach(a=>(a.buffs||[]).forEach(b=>{if(BUFFS[b]&&!s.has(b)){s.add(b);o.push(b)}}));
  return o;
}

const ROLE={melee:{label:'Mêlée',cls:'pill-melee'},tank:{label:'Tank',cls:'pill-tank'},range:{label:'Range',cls:'pill-range'},support:{label:'Support',cls:'pill-support'}};
const ROLE_DESC={melee:'Corps-à-corps',tank:'Ligne de front',range:'À distance',support:'Soutien'};
function lvCls(lv){return lv===5?'lv5':'lv7'}
function chk(col){return`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`}

// ── Mobile toggle ───────────────────────────────────────────
function toggleSidebar(){
  const s=document.getElementById('sidebar'),b=document.getElementById('toggleSidebar');
  s.classList.toggle('open');b.classList.toggle('open');
}
function updateToggleLbl(){
  const n=(sel.left?1:0)+(sel.right?1:0);
  const el=document.getElementById('toggleLbl');
  if(el)el.textContent=n>0?`${n}/2 sélectionnés`:'Sélectionner';
}

// ── State ───────────────────────────────────────────────────
let sel={left:null,right:null},nextSlot='left',activeType='';

// ── Rendering ──────────────────────────────────────────────
function renderContent(){
  const cmp=document.getElementById('compare');
  if(!sel.left&&!sel.right){
    cmp.innerHTML=`<div class="empty-state"><div class="empty-ring"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>Sélectionnez un monstre dans la grille</div><div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez deux monstres pour comparer</span></div>`;
    return;
  }
  const single=sel.left||sel.right;
  if(!sel.left||!sel.right){cmp.innerHTML=renderSingle(single)+'<div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez un 2ᵉ monstre</span></div>';return;}
  cmp.innerHTML=renderDuo(sel.left,sel.right);
  const lp=totalPts(MONSTERS[sel.left]),rp=totalPts(MONSTERS[sel.right]);
  const mx=Math.max(lp,rp)||1,lw=Math.round(lp/mx*46),rw=Math.round(rp/mx*46);
  document.getElementById('bottom').innerHTML=`<span class="bottom-label">Score</span>
  <span class="bottom-name l">${sel.left} <span style="font-size:.62rem;opacity:.6;font-weight:400">${lp} pts</span></span>
  <div class="bottom-bars"><div class="bar-l" style="width:${lw}%"></div><div class="bar-r" style="width:${rw}%"></div></div>
  <span class="bottom-name r">${sel.right} <span style="font-size:.62rem;opacity:.6;font-weight:400">${rp} pts</span></span>`;
}

function renderSingle(name){
  const m=MONSTERS[name],tot=totalPts(m),r=tot/MAX_TOTAL,c=scoreCol(r),g=scoreGrad(r),role=ROLE[m.type]||{label:m.type,cls:''};
  const awks=(m.awakenings||[]).filter(a=>a.level!==3).map(a=>{
    const pts=awkPts(a),ar=pts/100,ac=scoreCol(ar),ag=scoreGrad(ar);
    return`<div class="awk ${lvCls(a.level)}">
      <div class="awk-head"><span class="awk-lv">Éveil ${a.level}</span><span class="awk-score" style="color:${ac};border-color:${ac};background:rgba(${rgb(ac)},.1)">⚡ ${pts} pts</span><div class="awk-modes">${a.pvp?'<span class="mode-pvp">PvP</span>':''}${a.pve?'<span class="mode-pve">PvE</span>':''}</div></div>
      <div class="awk-desc">${hDesc(a.desc)}</div>
      ${chips(a.buffs)?`<div class="buff-list">${chips(a.buffs)}</div>`:''}
      <div class="awk-bar"><div class="awk-bar-track"><div class="awk-bar-fill" style="width:${Math.min(ar*100,100)}%;background:${ag}"></div></div><span class="awk-bar-val" style="color:${ac}">${pts}/100</span></div>
    </div>`
  }).join('');
  return`<div class="heads"><div class="hcard side-l" style="max-width:420px">
    <img class="hport" src="${IMAGES_PATH}${name}.png" alt="${name}" onerror="this.outerHTML='<div class=hport-ph>${name}</div>'">
    <div style="flex:1;min-width:0">
      <div class="hname">${name}</div>
      <span class="pill ${role.cls}">${role.label}</span>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:6px"><span class="hscore-num" style="color:${c}">${tot}</span><span class="hscore-den">/ ${MAX_TOTAL}</span></div>
      <div class="hbar"><div class="hbar-fill" style="width:${Math.min(r*100,100)}%;background:${g}"></div></div>
    </div></div></div>
  <div class="awk-area">
    <div class="awk-sec-label">Éveils (hors Éveil 3 commun)</div>
    <div class="awk-pairs" style="display:flex;flex-direction:column;gap:10px">${awks}</div>
  </div>`;
}

function renderDuo(nL,nR){
  const mL=MONSTERS[nL],mR=MONSTERS[nR];
  const totL=totalPts(mL),totR=totalPts(mR);
  const rL=totL/MAX_TOTAL,rR=totR/MAX_TOTAL;
  const winL=totL>totR,winR=totR>totL,diff=Math.abs(totL-totR);
  const wColor=winL?'var(--left)':winR?'var(--right)':'var(--gold)';
  const wName=winL?nL:winR?nR:null;
  const tL=mL.type,tR=mR.type;

  // Verdict
  let vtxt='';
  if(!wName) vtxt=`Scores identiques — les deux monstres sont équivalents.`;
  else if(diff<15) vtxt=`<span style="color:${wColor};font-weight:700">${wName}</span> est légèrement supérieur <strong>(+${diff} pts)</strong>.`;
  else if(diff<35) vtxt=`<span style="color:${wColor};font-weight:700">${wName}</span> prend l'avantage avec <strong>+${diff} pts</strong>.`;
  else vtxt=`<span style="color:${wColor};font-weight:700">${wName}</span> domine clairement avec <strong>+${diff} pts</strong>.`;

  // Mode scores (excl. AWK3)
  const pvpL=modeScore(mL,'pvp'),pvpR=modeScore(mR,'pvp');
  const pveL=modeScore(mL,'pve'),pveR=modeScore(mR,'pve');

  function modeRow(sL,sR,lblHtml,lblCls){
    const mx=Math.max(sL,sR,1);
    const wL=sL>sR,wR=sR>sL;
    const naStyle=`<span class="mode-na">—</span>`;
    const leftCell=sL>0?`<div class="mode-score-row" style="justify-content:flex-end">
      ${wL?chk('var(--left)'):'<div style="width:12px"></div>'}
      <span class="mode-pts" style="color:${wL?'var(--left)':'var(--text3)'}">${sL}p</span>
      <div class="mode-bar-wrap" style="max-width:60px"><div class="mode-bar-fill" style="width:${sL/mx*100}%;background:var(--left)"></div></div>
    </div>`:naStyle;
    const rightCell=sR>0?`<div class="mode-score-row">
      <div class="mode-bar-wrap" style="max-width:60px"><div class="mode-bar-fill" style="width:${sR/mx*100}%;background:var(--right)"></div></div>
      <span class="mode-pts" style="color:${wR?'var(--right)':'var(--text3)'}">${sR}p</span>
      ${wR?chk('var(--right)'):'<div style="width:12px"></div>'}
    </div>`:naStyle;
    return`<div class="bc-l">${leftCell}</div>
    <div class="bc-c"><span class="mode-lbl ${lblCls}">${lblHtml}</span></div>
    <div class="bc-r">${rightCell}</div>`;
  }

  // Unique / shared buffs
  const bL=allBuffsOf(nL),bR=allBuffsOf(nR);
  const setR=new Set(bR),setL=new Set(bL);
  const uniL=bL.filter(b=>!setR.has(b));
  const uniR=bR.filter(b=>!setL.has(b));
  const shared=bL.filter(b=>setR.has(b));

  function chipSet(ids,side){
    if(!ids.length)return`<span style="color:var(--text2);font-size:.72rem;font-style:italic">Aucun exclusif</span>`;
    return ids.map(id=>{const b=BUFFS[id];const team=b.team?'<span class="team-badge">TEAM</span>':'';return`<span class="buff-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.12)">${b.label}${team}</span>`}).join('');
  }

  // Awakening pairs (excl. AWK3)
  const awL=(mL.awakenings||[]).filter(a=>a.level!==3);
  const awR=(mR.awakenings||[]).filter(a=>a.level!==3);
  const maxA=Math.max(awL.length,awR.length);
  let pairRows='';
  for(let i=0;i<maxA;i++){
    const aL=awL[i],aR=awR[i],lv=aL?aL.level:aR.level;
    pairRows+=`<div class="awk-pair-row">
      <div>${aL?awkCard(aL):`<div class="awk ${lvCls(lv)}" style="opacity:.22;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.8rem">—</div>`}</div>
      <div>${aR?awkCard(aR):`<div class="awk ${lvCls(lv)}" style="opacity:.22;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.8rem">—</div>`}</div>
    </div>`;
  }

  return`
<div class="heads">
  <div class="hcard side-l${winL?' winner':''}">
    ${winL?`<div class="winner-badge">★ Meilleur score</div>`:''}
    <img class="hport" src="${IMAGES_PATH}${nL}.png" onerror="this.outerHTML='<div class=hport-ph>${nL}</div>'">
    <div style="flex:1;min-width:0">
      <div class="hname">${nL}</div>
      <span class="pill ${ROLE[tL]?.cls||''}">${ROLE[tL]?.label||tL}</span>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:5px"><span class="hscore-num" style="color:${scoreCol(rL)}">${totL}</span><span class="hscore-den">/ ${MAX_TOTAL}</span></div>
      <div class="hbar"><div class="hbar-fill" style="width:${Math.min(rL*100,100)}%;background:${scoreGrad(rL)}"></div></div>
    </div>
  </div>
  <div class="hcard side-r${winR?' winner':''}">
    ${winR?`<div class="winner-badge">★ Meilleur score</div>`:''}
    <img class="hport" src="${IMAGES_PATH}${nR}.png" onerror="this.outerHTML='<div class=hport-ph>${nR}</div>'">
    <div style="flex:1;min-width:0">
      <div class="hname">${nR}</div>
      <span class="pill ${ROLE[tR]?.cls||''}">${ROLE[tR]?.label||tR}</span>
      <div style="display:flex;align-items:baseline;gap:4px;margin-top:5px"><span class="hscore-num" style="color:${scoreCol(rR)}">${totR}</span><span class="hscore-den">/ ${MAX_TOTAL}</span></div>
      <div class="hbar"><div class="hbar-fill" style="width:${Math.min(rR*100,100)}%;background:${scoreGrad(rR)}"></div></div>
    </div>
  </div>
</div>

<div class="bilan">
  <div class="bilan-verdict"><span style="font-size:1rem">⚖️</span><span class="bilan-verdict-txt">${vtxt}</span></div>

  <div class="bilan-sec">
    <div class="bilan-sec-hd">Avantages exclusifs</div>
    <div class="bilan-3col">
      <div class="bc-l" style="flex-wrap:wrap;gap:4px;display:flex;justify-content:flex-end">${chipSet(uniL,'l')}</div>
      <div class="bc-c"><span style="font-size:.65rem;color:var(--text2)">VS</span></div>
      <div class="bc-r" style="flex-wrap:wrap;gap:4px;display:flex">${chipSet(uniR,'r')}</div>
    </div>
  </div>

  ${shared.length?`<div class="bilan-sec">
    <div class="bilan-shared"><span class="shared-lbl">Commun</span>${shared.map(id=>{const b=BUFFS[id];const t=b.team?'<span class="team-badge">TEAM</span>':'';return`<span class="buff-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.08);opacity:.7">${b.label}${t}</span>`}).join('')}</div>
  </div>`:''}
</div>

<div class="awk-area">
  <div class="awk-sec-label">Éveils comparés (hors Éveil 3 commun)</div>
  <div class="awk-pairs">${pairRows}</div>
</div>
<div class="bottom" id="bottom"></div>`;
}

function awkCard(a){
  const pts=awkPts(a),ar=pts/100,ac=scoreCol(ar),ag=scoreGrad(ar);
  return`<div class="awk ${lvCls(a.level)}">
  <div class="awk-head"><span class="awk-lv">Éveil ${a.level}</span><span class="awk-score" style="color:${ac};border-color:${ac};background:rgba(${rgb(ac)},.1)">⚡ ${pts} pts</span><div class="awk-modes">${a.pvp?'<span class="mode-pvp">PvP</span>':''}${a.pve?'<span class="mode-pve">PvE</span>':''}</div></div>
  <div class="awk-desc">${hDesc(a.desc)}</div>
  ${chips(a.buffs)?`<div class="buff-list">${chips(a.buffs)}</div>`:''}
  <div class="awk-bar"><div class="awk-bar-track"><div class="awk-bar-fill" style="width:${Math.min(ar*100,100)}%;background:${ag}"></div></div><span class="awk-bar-val" style="color:${ac}">${pts}/100</span></div>
</div>`;
}

// ── Grid ────────────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('monsterGrid'),q=document.getElementById('searchInput').value.toLowerCase();
  g.innerHTML='';
  const names=Object.keys(MONSTERS).filter(n=>(!activeType||MONSTERS[n].type===activeType)&&n.toLowerCase().includes(q));
  if(!names.length){g.innerHTML=`<div style="grid-column:1/-1;color:var(--text2);font-size:.75rem;padding:16px;text-align:center">Aucun résultat</div>`;return;}
  const TCOL={melee:'var(--melee)',tank:'var(--tank)',range:'var(--range)',support:'var(--support)'};
  names.forEach(name=>{
    const m=MONSTERS[name],el=document.createElement('div');
    el.className='m-tile';el.dataset.name=name;
    if(sel.left===name)el.classList.add('sel-l');
    if(sel.right===name)el.classList.add('sel-r');
    const dot=`<div class="m-dot" style="background:${TCOL[m.type]||'var(--text2)'}"></div>`;
    const badge=sel.left===name?`<span class="sel-badge" style="background:rgba(77,127,255,.2);color:var(--left);border:1px solid rgba(77,127,255,.4)">①</span>`:sel.right===name?`<span class="sel-badge" style="background:rgba(255,94,46,.2);color:var(--right);border:1px solid rgba(255,94,46,.4)">②</span>`:'';
    el.innerHTML=`<div style="position:relative">
      <img class="m-img" src="${IMAGES_PATH}${name}.png" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="m-img-ph" style="display:none">${name}</div>
      ${badge?`<div style="position:absolute;top:-4px;right:-4px">${badge}</div>`:''}
    </div>
    <div class="m-name">${name}</div>${dot}`;
    el.onclick=()=>pick(name);
    g.appendChild(el);
  });
}

function pick(name){
  if(sel.left===name){sel.left=null;nextSlot='left';}
  else if(sel.right===name){sel.right=null;nextSlot='right';}
  else{sel[nextSlot]=name;nextSlot=nextSlot==='left'?'right':'left';}
  updateToggleLbl();
  buildGrid();renderContent();
}

document.getElementById('typeFilter').addEventListener('click',e=>{
  const btn=e.target.closest('.tf');if(!btn)return;
  document.querySelectorAll('.tf').forEach(b=>{b.className='tf'+(b.classList.contains('all')?' all':'')});
  activeType=btn.dataset.type;
  btn.classList.add(activeType?`active-${activeType}`:'active-all');
  buildGrid();
});

buildGrid();
</script>
</body>

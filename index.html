<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Rush – Comparateur</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0f1623;--surface:#151f30;--surface2:#1a2740;--surface3:#1e2e4a;
  --border:#243350;--border2:#2e4068;
  --gold:#d4a44a;--gold-lt:#ecc46a;--gold-glow:rgba(212,164,74,.15);
  --text:#d8e4f8;--text2:#6a82aa;--text3:#9ab0cc;
  --c0:#4d7fff;--c1:#22cc88;--c2:#ff5e2e;
  --melee:#e05555;--tank:#4d8fd6;--range:#d49828;--support:#52b86a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Header */
header{height:44px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border2);display:flex;align-items:center;padding:0 14px;gap:10px;white-space:nowrap;overflow:hidden}
.logo-text{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold-lt);letter-spacing:2px}
.hsep{width:1px;height:20px;background:var(--border2);flex-shrink:0}
.hhint{font-size:.72rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis}
.toggle-btn{display:none;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 10px;color:var(--text3);font-size:.7rem;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0;transition:border-color .15s,color .15s;font-family:inherit}
.toggle-btn:hover{border-color:var(--gold);color:var(--gold-lt)}
.toggle-btn .arr{transition:transform .25s}
.toggle-btn.open .arr{transform:rotate(180deg)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* Sidebar */
.sidebar{width:186px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.search-box{padding:7px;border-bottom:1px solid var(--border)}
.search-inner{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 9px;transition:border-color .2s}
.search-inner:focus-within{border-color:var(--gold)}
.search-inner svg{flex-shrink:0;color:var(--text2)}
.search-inner input{background:none;border:none;outline:none;color:var(--text);font-size:.78rem;width:100%;font-family:inherit}
.search-inner input::placeholder{color:var(--text2)}
.type-filter{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:5px 7px;border-bottom:1px solid var(--border)}
.tf{font-size:.62rem;font-weight:700;padding:5px 2px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.tf:hover{color:var(--text);background:var(--surface2)}
.tf.all{grid-column:1/-1}
.tf.active-all{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-glow)}
.tf.active-melee{border-color:var(--melee);color:var(--melee);background:rgba(224,85,85,.1)}
.tf.active-tank{border-color:var(--tank);color:var(--tank);background:rgba(77,143,214,.1)}
.tf.active-range{border-color:var(--range);color:var(--range);background:rgba(212,152,40,.1)}
.tf.active-support{border-color:var(--support);color:var(--support);background:rgba(82,184,106,.1)}
.monster-grid{flex:1;overflow-y:auto;padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:4px;align-content:start}
.monster-grid::-webkit-scrollbar{width:3px}
.monster-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.m-tile{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 3px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background .12s,border-color .12s;text-align:center}
.m-tile:hover{background:var(--surface2);border-color:var(--border2)}
.m-img{width:44px;height:44px;border-radius:7px;object-fit:cover;border:1px solid var(--border2)}
.m-img-ph{width:44px;height:44px;border-radius:7px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.38rem;color:var(--text2);border:1px solid var(--border);line-height:1.3;padding:3px;text-align:center}
.m-name{font-size:.65rem;font-weight:600;color:var(--text3);max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-dot{width:5px;height:5px;border-radius:50%}
.sel-num{font-size:.55rem;font-weight:800;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-3px;right:-3px;line-height:1}

/* Compare */
.compare{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text2);font-size:.86rem}
.empty-ring{width:56px;height:56px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;opacity:.3}

/* Scroll area — desktop: scrolls itself / mobile: body scrolls, inner scrolls horizontally */
.cmp-scroll{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cmp-scroll::-webkit-scrollbar{width:3px;height:3px}
.cmp-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cmp-inner{padding:12px 14px 12px;min-width:0}

/* Header cards */
.heads{display:grid;gap:8px;margin-bottom:10px}
.hcard{background:var(--surface);border:1px solid var(--border2);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:11px;position:relative;overflow:hidden;min-width:0}
.hcard::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ha,var(--gold)),transparent)}
.hcard.winner{box-shadow:0 0 16px rgba(82,184,106,.1)}
.hport{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border2)}
.hport-ph{width:48px;height:48px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--text2);border:1px solid var(--border);flex-shrink:0;text-align:center;padding:3px}
.hname{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold-lt);letter-spacing:.7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.htype-pill{display:inline-block;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid;margin-top:3px}
.pill-melee{color:var(--melee);border-color:rgba(224,85,85,.35);background:rgba(224,85,85,.08)}
.pill-tank{color:var(--tank);border-color:rgba(77,143,214,.35);background:rgba(77,143,214,.08)}
.pill-range{color:var(--range);border-color:rgba(212,152,40,.35);background:rgba(212,152,40,.08)}
.pill-support{color:var(--support);border-color:rgba(82,184,106,.35);background:rgba(82,184,106,.08)}
.hscore{font-size:1.65rem;font-weight:700;line-height:1;margin-top:5px}
.hscore-den{font-size:.65rem;color:var(--text2);font-weight:400;margin-left:2px}
.hbar-wrap{margin-top:4px;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.hbar-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.winner-badge{position:absolute;bottom:8px;right:10px;font-size:.58rem;font-weight:700;color:#52b86a;background:rgba(82,184,106,.1);border:1px solid rgba(82,184,106,.22);border-radius:20px;padding:2px 7px}

/* Verdict */
.verdict{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;margin-bottom:10px;font-size:.8rem;line-height:1.6;display:flex;align-items:center;gap:7px;flex-wrap:wrap}

/* Awakenings */
.awk-section{margin-bottom:10px}
.awk-level-header{display:grid;gap:8px;margin-bottom:5px}
.awk-lv-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 10px;border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.awk-lv-label.lv5{background:rgba(212,164,74,.09);border:1px solid rgba(212,164,74,.22);color:var(--gold)}
.awk-lv-label.lv7{background:rgba(204,51,85,.09);border:1px solid rgba(204,51,85,.22);color:#dd5577}
.awk-lv-pts{font-size:.78rem;font-weight:700;white-space:nowrap}
.awk-row{display:grid;gap:8px}
.awk-card{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;position:relative;overflow:hidden}
.awk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.awk-card.lv5::before{background:var(--gold)}
.awk-card.lv7::before{background:#cc3355}
.awk-desc{font-size:.76rem;line-height:1.6;color:var(--text3);white-space:pre-line;margin-bottom:9px}
.awk-desc .vp{color:var(--text);font-weight:600}
.awk-desc .vm{color:#ff9966;font-weight:600}
.buff-list{display:flex;flex-direction:column;gap:4px}
.buff-row{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.025)}
.buff-row.is-cond{border-style:dashed;opacity:.8}
.buff-icon{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.buff-label{flex:1;font-size:.72rem;font-weight:500;line-height:1.3;color:var(--text3)}
.buff-tags{display:flex;gap:3px;flex-shrink:0}
.buff-tag{font-size:.54rem;font-weight:800;padding:1px 5px;border-radius:3px;line-height:1.5;letter-spacing:.2px}
.buff-tag.team{background:rgba(255,200,50,.13);color:#ffcc44;border:1px solid rgba(255,200,50,.22)}
.buff-tag.cond{background:rgba(180,160,80,.1);color:#ccaa44;border:1px solid rgba(180,160,80,.2)}
.buff-pts{font-size:.74rem;font-weight:700;flex-shrink:0;min-width:34px;text-align:right}
.buff-pts .base-pts{font-size:.57rem;opacity:.42;font-weight:400}

/* Shared */
.shared-row{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 13px;margin-bottom:10px}
.shared-title{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px}
.shared-list{display:flex;flex-wrap:wrap;gap:4px}
.shared-chip{font-size:.7rem;font-weight:500;padding:3px 9px;border-radius:5px;border:1px solid;display:inline-flex;align-items:center;opacity:.5}

/* Bottom bar */
.bottom{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;padding:0 14px;gap:10px;min-height:44px}
.bottom-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);flex-shrink:0}
.bottom-hint{font-size:.76rem;color:var(--text2);flex:1;text-align:center}
.btm-bars{flex:1;display:flex;gap:8px;align-items:center;min-width:0}
.btm-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.btm-name{font-size:.67rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btm-track{height:5px;background:var(--border);border-radius:2px;overflow:hidden}
.btm-fill{height:100%;border-radius:2px;transition:width .5s}
.btm-pts{font-size:.57rem;color:var(--text2)}

/* ── Mobile ── */
@media(max-width:700px){
  body{height:auto;overflow-y:auto}
  .toggle-btn{display:flex}
  .hhint{display:none}
  .hsep{display:none}
  .layout{flex-direction:column}
  .sidebar{
    width:100%;border-right:none;border-bottom:1px solid var(--border2);
    max-height:0;overflow:hidden;transition:max-height .3s ease;flex-shrink:0
  }
  .sidebar.open{max-height:290px}
  .monster-grid{grid-template-columns:repeat(4,1fr)}
  /* compare becomes natural height, body scrolls */
  .compare{overflow:visible;height:auto;flex:none}
  /* cmp-scroll: no fixed height, just allows horizontal scroll for wide grids */
  .cmp-scroll{
    flex:none;overflow-y:visible;overflow-x:auto;
    -webkit-overflow-scrolling:touch
  }
  .cmp-inner{padding:10px 10px 6px}
  .bottom{padding:8px 10px;min-height:auto}
  .btm-pts{display:none}
}
</style>
</head>

<header>
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2"><path d="M12 2L8 8H2l5 4-2 7 7-4 7 4-2-7 5-4h-6z"/></svg>
  <span class="logo-text">SW RUSH · COMPARATEUR</span>
  <div class="hsep"></div>
  <span class="hhint">Sélectionnez jusqu'à 3 monstres à comparer</span>
  <button class="toggle-btn" id="toggleSidebar" onclick="toggleSidebar()">
    <svg class="arr" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    <span id="toggleLbl">Sélectionner</span>
  </button>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <div class="search-inner">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Rechercher…" oninput="buildGrid()">
      </div>
    </div>
    <div class="type-filter" id="typeFilter">
      <button class="tf all active-all" data-type="">Tous</button>
      <button class="tf" data-type="melee">Mêlée</button>
      <button class="tf" data-type="tank">Tank</button>
      <button class="tf" data-type="range">Range</button>
      <button class="tf" data-type="support">Support</button>
    </div>
    <div class="monster-grid" id="monsterGrid"></div>
  </div>

  <div class="compare" id="compare">
    <div class="empty-state" id="emptyState">
      <div class="empty-ring"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
      Sélectionnez jusqu'à 3 monstres
    </div>
    <div class="bottom" id="bottom"><span class="bottom-hint">Sélectionnez des monstres pour comparer</span></div>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────
function rgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`}
const COND=0.6;
function bVal(id){const b=BUFFS[id];return b?b.power*(b.cond?COND:1):0}
function awkRaw(a){return(a.buffs||[]).reduce((s,id)=>s+bVal(id),0)}
const MAX_AWK=Math.max(...Object.values(MONSTERS).flatMap(m=>(m.awakenings||[]).filter(a=>a.level!==3).map(awkRaw)));
function awkPts(a){return Math.round(awkRaw(a)/MAX_AWK*100)}
function totPts(m){return(m.awakenings||[]).filter(a=>a.level!==3).reduce((s,a)=>s+awkPts(a),0)}
const MAX_T=200;
function sCol(r){return r>=.7?'#52b86a':r>=.4?'#d4a44a':'#c44040'}
function sGrad(r){return r>=.7?'linear-gradient(90deg,#1e5528,#52b86a)':r>=.4?'linear-gradient(90deg,#6a4010,#d4a44a)':'linear-gradient(90deg,#601818,#c44040)'}
function hD(t){return t.replace(/(\+\d+(?:[,.]\d+)?%)/g,'<span class="vp">$1</span>').replace(/(-\d+(?:[,.]\d+)?%)/g,'<span class="vm">$1</span>')}
const ROLE={melee:{l:'Mêlée',c:'pill-melee'},tank:{l:'Tank',c:'pill-tank'},range:{l:'Range',c:'pill-range'},support:{l:'Support',c:'pill-support'}};
const TCOL={melee:'var(--melee)',tank:'var(--tank)',range:'var(--range)',support:'var(--support)'};

// ── Components ───────────────────────────────────────────────
function buffRow(id){
  const b=BUFFS[id];if(!b)return'';
  const eff=Math.round(bVal(id)),isCond=!!b.cond;
  return`<div class="buff-row${isCond?' is-cond':''}">
    <div class="buff-icon" style="background:${b.color}"></div>
    <span class="buff-label">${b.label}</span>
    <div class="buff-tags">${b.team?'<span class="buff-tag team">TEAM</span>':''}${isCond?'<span class="buff-tag cond">COND</span>':''}</div>
    <span class="buff-pts" style="color:${b.color}">${eff}${isCond?`<span class="base-pts"> /${b.power}</span>`:''}</span>
  </div>`;
}

function awkCard(a){
  const pts=awkPts(a),c=sCol(pts/100);
  const modes=(a.pvp?`<span style="font-size:.58rem;font-weight:700;color:#c04040;background:rgba(192,64,64,.1);border:1px solid rgba(192,64,64,.22);border-radius:3px;padding:1px 6px">PvP</span>`:'')
    +(a.pve?`<span style="font-size:.58rem;font-weight:700;color:#2e9898;background:rgba(46,152,152,.1);border:1px solid rgba(46,152,152,.22);border-radius:3px;padding:1px 6px">PvE</span>`:'');
  return`<div class="awk-card lv${a.level}">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:9px">${modes}<span style="margin-left:auto;font-size:.82rem;font-weight:700;color:${c}">${pts} pts</span></div>
    <div class="awk-desc">${hD(a.desc)}</div>
    <div class="buff-list">${(a.buffs||[]).map(buffRow).join('')}</div>
  </div>`;
}

function headCard(name,color,winner){
  const m=MONSTERS[name],tot=totPts(m),r=tot/MAX_T,c=sCol(r),g=sGrad(r),ro=ROLE[m.type]||{l:m.type,c:''};
  return`<div class="hcard${winner?' winner':''}" style="--ha:${color}">
    ${winner?`<div class="winner-badge">★ Meilleur</div>`:''}
    <img class="hport" src="${IMAGES_PATH}${name}.png" onerror="this.outerHTML='<div class=hport-ph>${name}</div>'">
    <div style="flex:1;min-width:0">
      <div class="hname">${name}</div>
      <span class="htype-pill ${ro.c}">${ro.l}</span>
      <div class="hscore" style="color:${c}">${tot}<span class="hscore-den">/${MAX_T}</span></div>
      <div class="hbar-wrap"><div class="hbar-fill" style="width:${Math.min(r*100,100)}%;background:${g}"></div></div>
    </div>
  </div>`;
}

// ── Selection (array, max 3, replace oldest) ─────────────────
let sel=[];

function pick(name){
  const i=sel.indexOf(name);
  if(i!==-1)sel.splice(i,1);
  else{if(sel.length>=3)sel.shift();sel.push(name);}
  updateLbl();buildGrid();renderContent();
}

function updateLbl(){
  const el=document.getElementById('toggleLbl');
  if(el)el.textContent=sel.length?`${sel.length}/3 sélectionnés`:'Sélectionner';
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('toggleSidebar').classList.toggle('open');
}

// ── Render ───────────────────────────────────────────────────
function renderContent(){
  const cmp=document.getElementById('compare');
  const n=sel.length;
  
  // restore/hide empty state
  let es=document.getElementById('emptyState');
  if(!es){
    es=document.createElement('div');
    es.id='emptyState';es.className='empty-state';
    es.innerHTML='<div class="empty-ring"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>Sélectionnez jusqu\'à 3 monstres';
  }
  // Remove old scroll area if exists
  const old=document.getElementById('cmpScroll');if(old)old.remove();
  const btm=document.getElementById('bottom');
  
  if(!n){
    if(!document.getElementById('emptyState'))cmp.insertBefore(es,btm);
    es.style.display='';
    btm.innerHTML='<span class="bottom-hint">Sélectionnez des monstres pour comparer</span>';
    return;
  }
  es.style.display='none';
  
  const scores=sel.map(nm=>totPts(MONSTERS[nm]));
  const maxScore=Math.max(...scores);
  const onlyWinner=scores.filter(s=>s===maxScore).length===1;
  
  // Column sizing
  const minColW=n===3?200:n===2?240:300;
  const minW=n*minColW+((n-1)*8)+28; // cols * minW + gaps + padding
  const cols=`repeat(${n},minmax(${minColW}px,1fr))`;
  
  // Header cards
  const headsHtml=sel.map((nm,i)=>headCard(nm,COL_COLORS[i],onlyWinner&&scores[i]===maxScore)).join('');
  
  // Verdict
  const ranked=[...sel.map((nm,i)=>({nm,pts:scores[i],c:COL_COLORS[i]}))].sort((a,b)=>b.pts-a.pts);
  let verdictHtml='';
  if(n===1){
    verdictHtml=`Score : <strong style="color:${sCol(scores[0]/MAX_T)}">${scores[0]} pts</strong> / ${MAX_T}`;
  } else if(n===2){
    const d=Math.abs(scores[0]-scores[1]),w=scores.indexOf(maxScore);
    if(scores[0]===scores[1]) verdictHtml='Scores identiques.';
    else if(d<15) verdictHtml=`<strong style="color:${COL_COLORS[w]}">${sel[w]}</strong> légèrement supérieur (+${d} pts).`;
    else if(d<35) verdictHtml=`<strong style="color:${COL_COLORS[w]}">${sel[w]}</strong> prend l'avantage (+${d} pts).`;
    else verdictHtml=`<strong style="color:${COL_COLORS[w]}">${sel[w]}</strong> domine clairement (+${d} pts).`;
  } else {
    verdictHtml=ranked.map((r,i)=>`<span>${MEDALS[i]} <strong style="color:${r.c}">${r.nm}</strong> <span style="opacity:.5;font-size:.75rem">${r.pts} pts</span></span>`).join(`<span style="color:var(--border2);padding:0 3px">·</span>`);
  }
  
  // Awakenings by level
  const byLv={};
  sel.forEach((nm,ci)=>(MONSTERS[nm].awakenings||[]).filter(a=>a.level!==3).forEach(a=>{
    if(!byLv[a.level])byLv[a.level]=new Array(n).fill(null);
    byLv[a.level][ci]=a;
  }));
  
  let awkHtml='';
  for(const lv of[5,7]){
    if(!byLv[lv])continue;
    const awks=byLv[lv];
    const pts=awks.map(a=>a?awkPts(a):null);
    const mpx=Math.max(...pts.filter(p=>p!==null));
    const onlyW=pts.filter(p=>p===mpx).length===1;
    
    const hdrs=awks.map((a,i)=>{
      const p=pts[i],win=onlyW&&p===mpx;
      return`<div class="awk-lv-label lv${lv}"><span>Éveil ${lv}</span>${p!==null?`<span class="awk-lv-pts" style="color:${win?COL_COLORS[i]:'inherit'}">${p} pts${win?' ▲':''}</span>`:'<span style="opacity:.25">—</span>'}</div>`;
    }).join('');
    
    const cards=awks.map(a=>a?`<div>${awkCard(a)}</div>`:`<div><div class="awk-card lv${lv}" style="opacity:.12;min-height:54px;display:flex;align-items:center;justify-content:center;color:var(--text2)">—</div></div>`).join('');
    
    awkHtml+=`<div class="awk-section">
      <div class="awk-level-header" style="grid-template-columns:${cols}">${hdrs}</div>
      <div class="awk-row" style="grid-template-columns:${cols}">${cards}</div>
    </div>`;
  }
  
  // Shared buffs (all selected monsters share them)
  const bsets=sel.map(nm=>new Set((MONSTERS[nm].awakenings||[]).filter(a=>a.level!==3).flatMap(a=>a.buffs||[])));
  const shared=n>1?[...bsets[0]].filter(b=>bsets.every(s=>s.has(b))):[];
  const sharedHtml=shared.length?`<div class="shared-row">
    <div class="shared-title">Buffs communs à tous</div>
    <div class="shared-list">${shared.map(id=>{const b=BUFFS[id];return b?`<span class="shared-chip" style="color:${b.color};border-color:${b.color};background:rgba(${rgb(b.color)},.04)">${b.label}</span>`:''}).join('')}</div>
  </div>`:'';
  
  // Build scroll div
  const scroll=document.createElement('div');
  scroll.id='cmpScroll';scroll.className='cmp-scroll';
  scroll.innerHTML=`<div class="cmp-inner" style="min-width:${minW}px">
    <div class="heads" style="grid-template-columns:${cols}">${headsHtml}</div>
    <div class="verdict">⚖️ ${verdictHtml}</div>
    ${sharedHtml}${awkHtml}
  </div>`;
  cmp.insertBefore(scroll,btm);
  
  // Bottom bar
  if(n===1){
    btm.innerHTML=`<span class="bottom-hint">Ajoutez un 2ᵉ monstre pour comparer</span>`;
  } else {
    const barsHtml=ranked.map(r=>{
      const w=Math.round(r.pts/maxScore*100);
      return`<div class="btm-col">
        <span class="btm-name" style="color:${r.c}">${r.nm} <span style="opacity:.45;font-weight:400;font-size:.6rem">${r.pts}</span></span>
        <div class="btm-track"><div class="btm-fill" style="width:${w}%;background:${r.c}"></div></div>
      </div>`;
    }).join('');
    btm.innerHTML=`<span class="bottom-label">Score</span><div class="btm-bars">${barsHtml}</div>`;
  }
}

// ── Grid ─────────────────────────────────────────────────────
let activeType='';
function buildGrid(){
  const g=document.getElementById('monsterGrid'),q=document.getElementById('searchInput').value.toLowerCase();
  g.innerHTML='';
  const names=Object.keys(MONSTERS).filter(nm=>(!activeType||MONSTERS[nm].type===activeType)&&nm.toLowerCase().includes(q));
  if(!names.length){g.innerHTML=`<div style="grid-column:1/-1;color:var(--text2);font-size:.73rem;padding:14px;text-align:center">Aucun résultat</div>`;return;}
  names.forEach(name=>{
    const m=MONSTERS[name],pos=sel.indexOf(name),el=document.createElement('div');
    el.className='m-tile';
    if(pos!==-1){const c=COL_COLORS[pos];el.style.background=`rgba(${rgb(c)},.1)`;el.style.borderColor=`rgba(${rgb(c)},.5)`;}
    el.innerHTML=`<div style="position:relative">
      <img class="m-img" src="${IMAGES_PATH}${name}.png" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="m-img-ph" style="display:none">${name}</div>
      ${pos!==-1?`<div class="sel-num" style="background:rgba(${rgb(COL_COLORS[pos])},.28);color:${COL_COLORS[pos]}">${COL_NUMS[pos]}</div>`:''}
    </div>
    <div class="m-name">${name}</div>
    <div class="m-dot" style="background:${TCOL[m.type]||'var(--text2)'}"></div>`;
    el.onclick=()=>pick(name);
    g.appendChild(el);
  });
}

document.getElementById('typeFilter').addEventListener('click',e=>{
  const btn=e.target.closest('.tf');if(!btn)return;
  document.querySelectorAll('.tf').forEach(b=>{b.className='tf'+(b.classList.contains('all')?' all':'')});
  activeType=btn.dataset.type;
  btn.classList.add(activeType?`active-${activeType}`:'active-all');
  buildGrid();
});

buildGrid();
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Rush – Comparateur</title>
<style>
  :root {
    --bg:#0d0f1a;--card:#161929;--card2:#1e2235;--border:#2e3455;
    --gold:#f0c040;--pvp:#e05555;--pve:#4aada8;--text:#d0d8f0;--muted:#7a83a8;
    --atk:#e05555;--def:#4a90d9;--sup:#7bc67e;--acc:#c87adb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
  header{background:linear-gradient(90deg,#1a1f3a,#0d0f1a);border-bottom:2px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:14px}
  header h1{font-size:1.2rem;color:var(--gold);letter-spacing:1px}
  header span{font-size:.8rem;color:var(--muted)}
  .layout{display:flex;height:calc(100vh - 56px)}

  /* SIDEBAR */
  .sidebar{width:220px;min-width:180px;background:var(--card);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden}
  .sidebar-search{padding:8px;border-bottom:1px solid var(--border)}
  .sidebar-search input{width:100%;background:var(--card2);border:1px solid var(--border);
    border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem;outline:none}
  .sidebar-search input:focus{border-color:var(--gold)}
  .monster-list{display:flex;flex-direction:column;gap:4px;padding:8px;overflow-y:auto;flex:1}
  .m-item{display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:8px;
    border:2px solid transparent;padding:5px 8px;transition:background .15s,border-color .2s;background:var(--card2)}
  .m-item:hover{background:#252a40;border-color:var(--gold)}
  .m-item.selected-left{border-color:#5599ff;background:#1a2240}
  .m-item.selected-right{border-color:#ff7755;background:#2a1a15}
  .m-item img{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;border:1px solid var(--border)}
  .m-item .img-placeholder{width:48px;height:48px;border-radius:6px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--muted);
    flex-shrink:0;border:1px solid var(--border);text-align:center;padding:2px}
  .m-item-info{min-width:0}
  .m-item-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .m-item-type{font-size:.6rem;padding:1px 6px;border-radius:8px;font-weight:700;display:inline-block;margin-top:3px}
  .type-atk{background:#3a1a1a;color:var(--atk)}.type-def{background:#1a2a3a;color:var(--def)}
  .type-sup{background:#1a2e1a;color:var(--sup)}.type-acc{background:#2a1a3a;color:var(--acc)}

  /* COMPARE */
  .compare{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .compare-top{display:flex;flex:1;overflow:hidden}
  .compare-col{flex:1;padding:16px;overflow-y:auto;border-right:1px solid var(--border)}
  .compare-col:last-child{border-right:none}
  .compare-col.left-side{border-top:3px solid #5599ff}
  .compare-col.right-side{border-top:3px solid #ff7755}
  .empty-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--muted);gap:10px;font-size:.9rem}
  .empty-slot svg{opacity:.3}

  /* CARD */
  .mc-header{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
  .mc-portrait{width:90px;height:90px;border-radius:10px;object-fit:cover;border:2px solid var(--border);flex-shrink:0}
  .mc-portrait-placeholder{width:90px;height:90px;border-radius:10px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.7rem;flex-shrink:0}
  .mc-info h2{font-size:1.15rem;color:var(--gold)}
  .mc-type-badge{display:inline-block;font-size:.72rem;padding:2px 10px;border-radius:12px;font-weight:700;margin-top:5px}

  /* SCORE GLOBAL */
  .score-bar-wrap{background:var(--card2);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;margin-bottom:14px}
  .score-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .score-bar-label{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .score-bar-val{font-size:1.3rem;font-weight:700;color:var(--gold)}
  .score-bar-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#a07800,var(--gold));transition:width .6s ease}

  /* ÉVEILS */
  .section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
    margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px}
  .awakening-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;margin-bottom:8px}
  .awk-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .awk-level{font-size:.7rem;font-weight:700;color:var(--gold);background:#2a2400;
    border:1px solid var(--gold);border-radius:10px;padding:2px 9px;flex-shrink:0}
  .awk-score-badge{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:10px;flex-shrink:0}
  .awk-badges{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
  .awk-badge{font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
  .awk-badge.pvp{background:#3a1818;color:var(--pvp);border:1px solid var(--pvp)}
  .awk-badge.pve{background:#183030;color:var(--pve);border:1px solid var(--pve)}
  .awk-desc{font-size:.78rem;color:#c0ccf0;line-height:1.55;margin-bottom:6px}
  .awk-bar-row{display:flex;align-items:center;gap:8px;margin-top:7px}
  .awk-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
  .awk-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .buff-tag{display:inline-block;font-size:.62rem;padding:1px 6px;border-radius:8px;
    margin:2px 2px 0 0;font-weight:600;border:1px solid}

  /* BOTTOM */
  .compare-bottom{background:var(--card);border-top:1px solid var(--border);padding:10px 20px;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .cmp-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
  .no-cmp{color:var(--muted);font-size:.8rem;flex:1;text-align:center}
  .cmp-bar-l{height:14px;border-radius:3px 0 0 3px;background:#5599ff;transition:width .5s}
  .cmp-bar-r{height:14px;border-radius:0 3px 3px 0;background:#ff7755;transition:width .5s}
</style>
</head>
<body>
<script>
// ⚙️ CONFIG
const IMAGES_PATH = "./images/";

// ╔══════════════════════════════════════════════════════════════════╗
// ║  📖 BIBLIOTHÈQUE DES EFFETS / BUFFS                             ║
// ╠══════════════════════════════════════════════════════════════════╣
// ║  power : score de puissance de l'effet (1 = faible, 10 = fort)  ║
// ║  TEMPLATE :                                                      ║
// ║  "id": { label:"", desc:"", color:"#hex", power: 5 },           ║
// ╚══════════════════════════════════════════════════════════════════╝
const BUFFS = {
  // Offensifs
  "atk_up":      { label:"ATQ ↑",          desc:"Augmente l'ATQ alliée.",               color:"#e05555", power:6 },
  "atk_spd_up":  { label:"Vit. ATQ ↑",     desc:"Augmente la vitesse d'attaque.",        color:"#ff8c42", power:5 },
  "crit_up":     { label:"CRIT ↑",          desc:"Augmente le taux de critique.",         color:"#ffcc00", power:6 },
  "crit_dmg_up": { label:"Dég. CRIT ↑",    desc:"Augmente les dégâts critiques.",        color:"#ffd966", power:7 },
  "ignore_def":  { label:"Perce DEF",       desc:"Ignore une partie de la DEF ennemie.", color:"#cc6600", power:8 },
  // Défensifs
  "def_up":      { label:"DEF ↑",           desc:"Augmente la DEF alliée.",              color:"#4a90d9", power:5 },
  "shield":      { label:"Bouclier",         desc:"Absorbe une quantité de dégâts.",      color:"#5599ff", power:7 },
  "invincible":  { label:"Invincible",       desc:"Immunise aux dégâts X tour(s).",       color:"#88ccff", power:9 },
  "reflect":     { label:"Réflexion",        desc:"Renvoie une partie des dégâts.",       color:"#3366cc", power:6 },
  // Support
  "heal":        { label:"Soin",             desc:"Restaure des PV.",                     color:"#7bc67e", power:5 },
  "regen":       { label:"Régén. PV",        desc:"Restaure des PV chaque tour.",         color:"#5cb85c", power:6 },
  "revive":      { label:"Résurrection",     desc:"Ranime un allié avec % PV max.",       color:"#aaffaa", power:10 },
  "cleanse":     { label:"Purification",     desc:"Supprime les debuffs d'un allié.",     color:"#66ff99", power:7 },
  "immunity":    { label:"Immunité",         desc:"Empêche l'application de debuffs.",    color:"#33cc77", power:8 },
  "extra_turn":  { label:"Tour bonus",       desc:"Accorde un tour supplémentaire.",      color:"#cc88ff", power:9 },
  "spd_up":      { label:"Vit. ↑",          desc:"Augmente la vitesse de tour.",          color:"#aa66ff", power:7 },
  "cd_reset":    { label:"Reset CD",         desc:"Réinitialise les temps de recharge.",  color:"#44aacc", power:9 },
  // Debuffs
  "stun":        { label:"Étourdissement",   desc:"Passe le tour de la cible.",           color:"#ffaa00", power:8 },
  "freeze":      { label:"Gel",              desc:"Immobilise la cible.",                 color:"#88ddff", power:8 },
  "sleep":       { label:"Sommeil",          desc:"Endort la cible.",                     color:"#9966cc", power:7 },
  "taunt":       { label:"Provocation",      desc:"Force l'ennemi à attaquer le lanceur.",color:"#cc4444", power:6 },
  "silence":     { label:"Silence",          desc:"Empêche les compétences actives.",     color:"#888888", power:7 },
  "dot":         { label:"DoT",              desc:"Dégâts sur la durée.",                 color:"#cc6600", power:5 },
  "burn":        { label:"Brûlure",          desc:"DoT feu.",                             color:"#ff4400", power:5 },
  "poison":      { label:"Poison",           desc:"DoT poison.",                          color:"#66bb00", power:5 },
  "bleed":       { label:"Saignement",       desc:"DoT % PV max ennemis.",               color:"#cc0033", power:7 },
  "atk_down":    { label:"ATQ ↓",            desc:"Réduit l'ATQ ennemie.",               color:"#994444", power:6 },
  "def_down":    { label:"DEF ↓",            desc:"Réduit la DEF ennemie.",              color:"#336699", power:6 },
  "spd_down":    { label:"Vit. ↓",           desc:"Réduit la vitesse.",                  color:"#776699", power:5 },
  "heal_block":  { label:"Anti-soin",         desc:"Empêche de recevoir des soins.",      color:"#cc3366", power:7 },
  "strip":       { label:"Vol de buff",       desc:"Retire un buff ennemi.",              color:"#ff6699", power:8 },
  "dec_atb":     { label:"ATB ↓",            desc:"Réduit la jauge d'action.",           color:"#aa4488", power:7 },
  "hp_debuff":   { label:"Réduc. PV max",    desc:"Réduit les PV maximum.",              color:"#882244", power:6 },
};

// ╔══════════════════════════════════════════════════════════════════╗
// ║  👾 BIBLIOTHÈQUE DES MONSTRES                                   ║
// ╠══════════════════════════════════════════════════════════════════╣
// ║  TEMPLATE :                                                      ║
// ║  "NomMonstre": {                                                 ║
// ║    image: "",        ← laisser vide (auto NomMonstre.png)       ║
// ║    type: "atk",      ← "atk" | "def" | "sup" | "acc"           ║
// ║    awakenings: [                                                 ║
// ║      {                                                           ║
// ║        level: 3,                                                 ║
// ║        desc: "Description du bonus.",                            ║
// ║        buffs: ["atk_up", "bleed"],  ← IDs de BUFFS              ║
// ║        pvp: true,                                                ║
// ║        pve: false,                                               ║
// ║      },                                                          ║
// ║    ],                                                            ║
// ║  },                                                              ║
// ╚══════════════════════════════════════════════════════════════════╝
const MONSTERS = {

  "Craka": {
    image: "", type: "atk",
    awakenings: [
      {
        level: 3,
        desc: "Réduit de 100% le temps de recharge de ses compétences au début du combat.",
        buffs: ["cd_reset"],
        pvp: true, pve: true,
      },
      {
        level: 5,
        desc: "Début de combat : ATQ +10% (cumulable) + Réduc. dégâts longue portée -30% (suppression impossible, cumulable). Chaque application de saignement accorde à un allié « Détection point faible – Saignement 10% » pendant 10s (cumulable).",
        buffs: ["atk_up", "def_up", "bleed"],
        pvp: true, pve: false,
      },
      {
        level: 7,
        desc: "Attaque réussie : applique « Point faible – Saignement 15% » 10s (suppression impossible, cumulable). Dégâts infligés +20% (suppression impossible, cumulable).",
        buffs: ["bleed", "atk_up"],
        pvp: true, pve: false,
      },
    ],
  },

  // ← Ajoutez vos monstres ici

};
</script>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f0c040" stroke-width="2">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </svg>
  <h1>SW Rush – Comparateur</h1>
  <span>Cliquez un monstre → gauche &nbsp;|&nbsp; Re-cliquez → droite</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="🔍 Rechercher…" oninput="filterMonsters()">
    </div>
    <div class="monster-list" id="monsterList"></div>
  </div>

  <div class="compare">
    <div class="compare-top">
      <div class="compare-col left-side" id="colLeft"><div class="empty-slot">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>Sélectionnez le 1er monstre
      </div></div>
      <div class="compare-col right-side" id="colRight"><div class="empty-slot">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>Sélectionnez le 2ème monstre
      </div></div>
    </div>
    <div class="compare-bottom" id="compareBottom">
      <span class="no-cmp">← Sélectionnez deux monstres pour comparer</span>
    </div>
  </div>
</div>

<script>
let selected={left:null,right:null}, nextSlot='left';
const typeLabel=t=>({atk:'ATQ',def:'DEF',sup:'SUP',acc:'ACC'}[t]||t.toUpperCase());

function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`}

// Score d'un éveil = somme des power de ses buffs
function awkScore(a){
  return (a.buffs||[]).reduce((s,id)=>s+(BUFFS[id]?BUFFS[id].power:0), 0);
}
// Score total d'un monstre = somme de tous ses éveils
function monsterScore(m){
  return (m.awakenings||[]).reduce((s,a)=>s+awkScore(a), 0);
}
// Score max théorique pour la barre (nb éveils × 10 × nb buffs max ou fixe à 30 par éveil)
function monsterMaxScore(m){
  return (m.awakenings||[]).length * 30;
}

// Couleur dynamique selon ratio du score (rouge→orange→vert)
function scoreColor(ratio){
  if(ratio>=.75) return '#7bc67e';
  if(ratio>=.45) return '#f0c040';
  return '#e05555';
}

function renderBuffTags(ids=[]){
  return ids.map(id=>{const b=BUFFS[id];if(!b)return'';const rgb=hexToRgb(b.color);
    return`<span class="buff-tag" style="color:${b.color};border-color:${b.color};background:rgba(${rgb},.14)" title="${b.desc} (puissance: ${b.power})">${b.label}</span>`;
  }).join('');
}

function renderMonsterCard(name){
  const m=MONSTERS[name];
  const total=monsterScore(m), maxT=monsterMaxScore(m)||1;
  const ratio=total/maxT;
  const color=scoreColor(ratio);
  const src=`${IMAGES_PATH}${name}.png`;
  const portrait=`<img class="mc-portrait" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=mc-portrait-placeholder>${name}</div>'">`;

  let awkHTML='';
  (m.awakenings||[]).forEach(a=>{
    const sc=awkScore(a);
    const maxAw=30; // max par éveil
    const aRatio=sc/maxAw;
    const aColor=scoreColor(aRatio);
    const tags=renderBuffTags(a.buffs||[]);
    const pvpB=a.pvp?`<span class="awk-badge pvp">PvP</span>`:'';
    const pveB=a.pve?`<span class="awk-badge pve">PvE</span>`:'';
    awkHTML+=`
      <div class="awakening-card">
        <div class="awk-top">
          <span class="awk-level">Éveil ${a.level}</span>
          <span class="awk-score-badge" style="color:${aColor};background:rgba(${hexToRgb(aColor)},.12);border:1px solid ${aColor}">⚡ ${sc} pts</span>
          <div class="awk-badges">${pvpB}${pveB}</div>
        </div>
        <div class="awk-desc">${a.desc}</div>
        ${tags?`<div style="margin-top:5px">${tags}</div>`:''}
        <div class="awk-bar-row">
          <div class="awk-bar-bg">
            <div class="awk-bar-fill" style="width:${Math.min(aRatio*100,100)}%;background:${aColor}"></div>
          </div>
          <span style="font-size:.65rem;color:${aColor};width:38px;text-align:right;flex-shrink:0">${sc}/${maxAw}</span>
        </div>
      </div>`;
  });
  if(!awkHTML) awkHTML=`<div style="font-size:.8rem;color:var(--muted);padding:6px 0">Aucun éveil renseigné.</div>`;

  return`
    <div class="mc-header">
      ${portrait}
      <div class="mc-info">
        <h2>${name}</h2>
        <span class="mc-type-badge type-${m.type}">${typeLabel(m.type)}</span>
      </div>
    </div>
    <div class="score-bar-wrap">
      <div class="score-bar-top">
        <span class="score-bar-label">Score global éveils</span>
        <span class="score-bar-val" style="color:${color}">${total} pts</span>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${Math.min(ratio*100,100)}%;background:linear-gradient(90deg,${color}99,${color})"></div>
      </div>
    </div>
    <div class="section-title">⬡ Éveils (${(m.awakenings||[]).length})</div>
    ${awkHTML}`;
}

function updateCompareBar(){
  const bot=document.getElementById('compareBottom');
  if(!selected.left||!selected.right){
    bot.innerHTML=`<span class="no-cmp">← Sélectionnez deux monstres pour comparer</span>`;
    return;
  }
  const ls=monsterScore(MONSTERS[selected.left]), rs=monsterScore(MONSTERS[selected.right]);
  const mx=Math.max(ls,rs)||1;
  const lw=Math.round(ls/mx*50), rw=Math.round(rs/mx*50);
  bot.innerHTML=`
    <span class="cmp-label">Score total</span>
    <span style="color:#5599ff;font-weight:700;font-size:.8rem;min-width:100px;text-align:right">${selected.left} (${ls} pts)</span>
    <div style="flex:1;display:flex;gap:2px;align-items:center">
      <div class="cmp-bar-l" style="width:${lw}%"></div>
      <div class="cmp-bar-r" style="width:${rw}%"></div>
    </div>
    <span style="color:#ff7755;font-weight:700;font-size:.8rem;min-width:100px">${selected.right} (${rs} pts)</span>`;
}

function selectMonster(name){
  const slot=nextSlot, colId='col'+slot.charAt(0).toUpperCase()+slot.slice(1);
  if(selected[slot]===name){
    selected[slot]=null;
    document.getElementById(colId).innerHTML=`<div class="empty-slot">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>Sélectionnez un monstre</div>`;
  } else {
    selected[slot]=name;
    document.getElementById(colId).innerHTML=renderMonsterCard(name);
    nextSlot=slot==='left'?'right':'left';
  }
  refreshItems(); updateCompareBar();
}

function refreshItems(){
  document.querySelectorAll('.m-item').forEach(el=>{
    el.classList.toggle('selected-left', selected.left===el.dataset.name);
    el.classList.toggle('selected-right',selected.right===el.dataset.name);
  });
}

function buildList(filter=''){
  const list=document.getElementById('monsterList');
  list.innerHTML='';
  const names=Object.keys(MONSTERS).filter(n=>n.toLowerCase().includes(filter.toLowerCase()));
  if(!names.length){
    list.innerHTML=`<div style="color:var(--muted);font-size:.8rem;padding:10px;text-align:center">Aucun monstre ajouté.</div>`;
    return;
  }
  names.forEach(name=>{
    const m=MONSTERS[name], el=document.createElement('div');
    el.className='m-item'; el.dataset.name=name;
    if(selected.left===name) el.classList.add('selected-left');
    if(selected.right===name) el.classList.add('selected-right');
    const src=`${IMAGES_PATH}${name}.png`;
    const sc=monsterScore(m);
    const color=scoreColor(sc/Math.max(monsterMaxScore(m),1));
    el.innerHTML=`
      <img src="${src}" alt="${name}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="img-placeholder" style="display:none">${name}</div>
      <div class="m-item-info">
        <div class="m-item-name">${name}</div>
        <span class="m-item-type type-${m.type}">${typeLabel(m.type)}</span>
        <div style="font-size:.62rem;color:${color};margin-top:3px;font-weight:600">⚡ ${sc} pts</div>
      </div>`;
    el.onclick=()=>selectMonster(name);
    list.appendChild(el);
  });
}

function filterMonsters(){buildList(document.getElementById('searchInput').value);}
buildList();
</script>
</body>
